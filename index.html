<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messe-Tool</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#fff; --bg2:#f5f5f3; --bg3:#eeecea;
      --text:#1a1a18; --text2:#6b6b67;
      --border:rgba(0,0,0,0.13); --border2:rgba(0,0,0,0.22);
      --info-bg:#e6f1fb; --info:#185fa5;
      --ok-bg:#eaf3de; --ok:#3b6d11;
      --warn-bg:#faeeda; --warn:#854f0b;
      --err-bg:#fcebeb; --err:#a32d2d;
      --r:8px; --rl:12px;
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#1e1e1c; --bg2:#2a2a28; --bg3:#333331;
        --text:#f0ede8; --text2:#a0a09c;
        --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.2);
        --info-bg:#0c447c; --info:#85b7eb;
        --ok-bg:#27500a; --ok:#97c459;
        --warn-bg:#633806; --warn:#ef9f27;
        --err-bg:#791f1f; --err:#f09595;
      }
    }
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;color:var(--text);background:var(--bg3);min-height:100vh;}
    #app{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;}
    input[type=number],input[type=text]{width:100%;padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:14px;outline:none;font-family:inherit;}
    input:focus{box-shadow:0 0 0 2px var(--info);}
    button{font-family:inherit;cursor:pointer;}
    .card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:10px 12px;margin-bottom:8px;}
    .muted{font-size:11px;color:var(--text2);}
    .tabs{display:flex;border-bottom:0.5px solid var(--border);}
    .tab{flex:1;padding:10px 2px;border:none;background:none;font-size:11px;color:var(--text2);border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
    .tab.active{color:var(--info);border-bottom-color:var(--info);}
    .tab i{font-size:20px;}
    .pill{font-size:12px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--border);background:none;color:var(--text);}
    .pill.active{background:var(--info-bg);color:var(--info);border-color:var(--info);}
    .btn{font-size:13px;padding:6px 12px;border-radius:var(--r);border:0.5px solid var(--border2);background:none;color:var(--text);}
    .btn-sm{font-size:11px;padding:3px 8px;border-radius:var(--r);border:0.5px solid var(--border2);background:none;color:var(--text2);}
    .badge{font-size:11px;padding:2px 8px;border-radius:12px;}
    .badge.ok{background:var(--ok-bg);color:var(--ok);}
    .badge.warn{background:var(--warn-bg);color:var(--warn);}
    .msg{padding:8px 12px;border-radius:var(--r);font-size:13px;margin-bottom:8px;}
    .msg.ok{background:var(--ok-bg);color:var(--ok);}
    .msg.warn{background:var(--warn-bg);color:var(--warn);}
    .msg.err{background:var(--err-bg);color:var(--err);}
    .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
    .stat{background:var(--bg2);border-radius:var(--r);padding:8px 10px;}
    .stat .slabel{font-size:10px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px;}
    .stat .svalue{font-size:20px;font-weight:500;}
    .scroll-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;}
    .chip{flex-shrink:0;background:var(--bg2);border-radius:var(--r);padding:4px 10px;text-align:center;min-width:58px;}
    .chip .csku{font-size:10px;color:var(--text2);}
    .chip .cqty{font-weight:500;}
    #view-prep,#view-warehouse,#view-sales{display:none;padding:12px 16px;}
  </style>
</head>
<body>
<div id="app">
  <div id="header" style="padding:14px 16px 0;display:flex;justify-content:space-between;align-items:center;">
    <div style="display:flex;align-items:center;gap:8px;">
      <i class="ti ti-scuba-diving" style="font-size:22px;color:var(--info)"></i>
      <span style="font-weight:500;font-size:16px;">Messe-Tool</span>
    </div>
    <div style="display:flex;gap:6px;align-items:center;">
      <button id="btn-reload" class="btn" style="font-size:12px;padding:3px 8px;display:none;align-items:center;gap:4px;">
        <i class="ti ti-refresh"></i> <span id="art-count">0</span>
      </button>
      <button class="pill role-btn" data-role="standard">Verkäufer</button>
      <button class="pill role-btn" data-role="supervisor">Supervisor</button>
    </div>
  </div>

  <div id="load-status" style="padding:24px 16px;text-align:center;color:var(--text2);font-size:13px;">
    <i class="ti ti-loader-2" style="font-size:28px;display:block;margin-bottom:8px;"></i>
    Artikelstammdaten werden geladen…
  </div>

  <div id="main" style="display:none;">
    <div class="tabs" style="margin-top:10px;">
      <button class="tab active" data-tab="prep"><i class="ti ti-clipboard-list"></i>Vorbereitung</button>
      <button class="tab" data-tab="warehouse"><i class="ti ti-packages"></i>Kommission</button>
      <button class="tab" data-tab="sales"><i class="ti ti-shopping-cart"></i>Verkauf</button>
    </div>
    <div id="notification" style="display:none;margin:8px 16px 0;"></div>
    <div id="view-prep"></div>
    <div id="view-warehouse"></div>
    <div id="view-sales"></div>
  </div>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────
const DEFAULT_SHEET_ID = "11Pzm0vNCKUC883rhTftRAD1SzW8CdXo30tZPSu0iYEw";
const STORE_KEY = "messetool_v1";

function getSheetId() {
  return new URLSearchParams(location.search).get("sheet") || DEFAULT_SHEET_ID;
}

// ── PERSISTENZ ───────────────────────────────────────────────────────────
function saveState() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({ planned, committed, commitDone, salesLists, activeListId, role }));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    // Restore with integer keys
    planned    = objIntKeys(s.planned    || {});
    committed  = objIntKeys(s.committed  || {});
    commitDone = objIntKeys(s.commitDone || {});
    salesLists = s.salesLists || [];
    activeListId = s.activeListId || null;
    if (s.role) {
      role = s.role;
      document.querySelectorAll(".role-btn").forEach(b => b.classList.toggle("active", b.dataset.role === role));
    }
  } catch(e) {}
}

function objIntKeys(o) {
  const r = {};
  Object.entries(o).forEach(([k,v]) => { r[parseInt(k)] = v; });
  return r;
}

// ── STATE ────────────────────────────────────────────────────────────────
let articles = [];
let role = "standard";
let planned    = {};
let committed  = {};
let commitDone = {};
let salesLists = [];
let activeListId = null;
let currentView = "prep";

// ── HELPERS ──────────────────────────────────────────────────────────────
const fmtEur = v => Number(v).toLocaleString("de-DE",{style:"currency",currency:"EUR"});
const parseNum = v => parseFloat(String(v||"0").replace(",","."))||0;
const qs = s => document.querySelector(s);

function parseCSVLine(line) {
  const cols=[]; let cur="", inQ=false;
  for (let i=0;i<line.length;i++) {
    const ch=line[i];
    if(ch==='"'){inQ=!inQ;}
    else if(ch===','&&!inQ){cols.push(cur.trim());cur="";}
    else{cur+=ch;}
  }
  cols.push(cur.trim());
  return cols;
}

function csvToArticles(csv) {
  const lines=csv.trim().split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2) return [];
  const headers=parseCSVLine(lines[0]).map(h=>h.replace(/^"|"$/g,"").toUpperCase().trim());
  const idx=k=>headers.indexOf(k);
  return lines.slice(1).map((line,i)=>{
    const c=parseCSVLine(line).map(v=>v.replace(/^"|"$/g,"").trim());
    if(!c[idx("SKU")]) return null;
    return {
      id:i+1, sku:c[idx("SKU")]||"", ean:c[idx("EAN")]||"",
      name:c[idx("NAME")]||"", category:c[idx("KATEGORIE")]||"",
      costPrice:parseNum(c[idx("EKNETTO")]), uvp:parseNum(c[idx("UVPBRUTTO")]),
      price:parseNum(c[idx("VKBRUTTO")]), minPrice:parseNum(c[idx("MINDESTVK")]),
      supplier:c[idx("LIEFERANT")]||"", stock:parseNum(c[idx("QUANTITY")]),
      image:c[idx("IMAGE")]||"", atlosId:c[idx("ATLOSID")]||"",
    };
  }).filter(Boolean);
}

async function loadSheet() {
  const id = getSheetId();
  const url = `https://docs.google.com/spreadsheets/d/${id}/export?format=csv`;
  qs("#load-status").style.display = "block";
  qs("#main").style.display = "none";
  qs("#load-status").innerHTML = `<i class="ti ti-loader-2" style="font-size:28px;display:block;margin-bottom:8px;"></i>Artikelstammdaten werden geladen…`;
  try {
    const r = await fetch(url);
    if(!r.ok) throw new Error(`HTTP ${r.status} – Tabelle nicht erreichbar.`);
    const csv = await r.text();
    articles = csvToArticles(csv);
    if(articles.length===0) throw new Error("Keine Artikel gefunden – Spaltenbezeichnungen prüfen.");
    loadState();
    qs("#load-status").style.display = "none";
    qs("#main").style.display = "block";
    qs("#art-count").textContent = articles.length;
    qs("#btn-reload").style.display = "flex";
    showNotification(`${articles.length} Artikel geladen`,"ok");
    renderView();
  } catch(e) {
    qs("#load-status").innerHTML = `
      <div class="msg err" style="text-align:left;">
        <i class="ti ti-alert-circle"></i> ${e.message}<br><br>
        <strong>Hinweis:</strong> Die Google Tabelle muss öffentlich freigegeben sein:<br>
        Teilen → "Jeder mit dem Link" → Betrachter
      </div>
      <button class="btn" onclick="loadSheet()" style="margin-top:10px;">Erneut versuchen</button>`;
  }
}

let notifTimer;
function showNotification(msg, type="ok") {
  const n=qs("#notification");
  n.className=`msg ${type}`;
  n.textContent=msg;
  n.style.display="block";
  clearTimeout(notifTimer);
  notifTimer=setTimeout(()=>{n.style.display="none";},2800);
}

// ── RENDER ───────────────────────────────────────────────────────────────
function renderView() {
  ["prep","warehouse","sales"].forEach(v=>{
    qs(`#view-${v}`).style.display = v===currentView?"block":"none";
  });
  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.toggle("active",t.dataset.tab===currentView);
  });
  if(currentView==="prep")      renderPrep();
  if(currentView==="warehouse") renderWarehouse();
  if(currentView==="sales")     renderSales();
}

// ── VORBEREITUNG ─────────────────────────────────────────────────────────
function renderPrep() {
  const wrap=qs("#view-prep");
  wrap.innerHTML=`<p class="muted" style="margin-bottom:12px;">Sollmengen für die Messe festlegen.</p>`;
  articles.forEach(art=>{
    const qty=planned[art.id]||0;
    const comm=committed[art.id]||0;
    const done=commitDone[art.id]||false;
    const canCommit=art.stock>=qty;
    const toOrder=qty>art.stock?qty-art.stock:0;
    const offen=qty-comm;

    // Status-Badge
    let statusHTML="";
    if(qty>0){
      if(done){
        statusHTML=`<span class="badge ok" style="margin-left:6px;"><i class="ti ti-check" style="font-size:10px;"></i> Kommissioniert (${comm})</span>`;
      } else if(comm>0 && offen>0){
        statusHTML=`<span class="badge warn" style="margin-left:6px;"><i class="ti ti-clock" style="font-size:10px;"></i> Teilw. komm. (${comm}/${qty})</span>`;
      } else {
        statusHTML=`<span class="badge" style="margin-left:6px;background:var(--info-bg);color:var(--info);">
          <i class="ti ti-flag" style="font-size:10px;"></i> Ausgewählt (${qty})</span>`;
      }
    }

    const card=document.createElement("div");
    card.className="card";
    if(qty>0) card.style.borderColor = done ? "var(--ok)" : "var(--info)";
    card.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
        <div style="flex:1;min-width:0;padding-right:8px;">
          <div style="font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${art.name}</div>
          <div class="muted">${art.sku} · ${art.category}</div>
          <div class="muted">${art.ean?"EAN: "+art.ean+" · ":""}VK: ${fmtEur(art.price)} · Min: ${fmtEur(art.minPrice)}</div>
        </div>
        <div style="text-align:right;font-size:12px;flex-shrink:0;">
          <div style="color:var(--text2);">Lager</div>
          <div style="font-weight:500;">${art.stock}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span class="muted">Menge:</span>
        <input type="number" min="0" value="${qty||""}" placeholder="0"
          style="width:72px;text-align:center;" data-id="${art.id}" />
        ${qty>0 ? `<span class="badge ${canCommit?"ok":"warn"}">${canCommit?"✓ verfügbar":toOrder+" bestellen"}</span>` : ""}
        ${statusHTML}
      </div>
      ${qty>0 && !done ? `
      <div style="margin-top:8px;display:flex;gap:12px;font-size:12px;">
        <span style="color:var(--info);"><i class="ti ti-flag" style="font-size:11px;"></i> Ausgewählt: ${qty}</span>
        <span style="color:var(--ok);"><i class="ti ti-packages" style="font-size:11px;"></i> Kommissioniert: ${comm}</span>
        ${offen>0?`<span style="color:var(--warn);"><i class="ti ti-clock" style="font-size:11px;"></i> Offen: ${offen}</span>`:""}
      </div>` : ""}`;
    wrap.appendChild(card);
    const inp=card.querySelector("input");
    inp.addEventListener("change",e=>{
      planned[art.id]=Math.max(0,parseInt(e.target.value)||0);
      saveState(); renderPrep();
    });
    inp.addEventListener("keydown",e=>{ if(e.key==="Enter") e.target.blur(); });
  });
}

// ── KOMMISSIONIERUNG ─────────────────────────────────────────────────────
function renderWarehouse() {
  const wrap=qs("#view-warehouse");
  wrap.innerHTML=`<p class="muted" style="margin-bottom:12px;">Menge prüfen, entnehmen & bestätigen. Bestätigte Positionen können korrigiert werden.</p>`;

  const toCommit=articles.filter(a=>(planned[a.id]||0)>0);
  if(toCommit.length===0){
    wrap.innerHTML+=`<div style="text-align:center;padding:24px 0;" class="muted">Noch keine Artikel in der Vorbereitung geplant.</div>`;
  } else {
    toCommit.forEach(art=>{
      const qty=planned[art.id]||0;
      const done=commitDone[art.id];
      const card=document.createElement("div");
      card.className="card";
      card.style.border=`0.5px solid ${done?"var(--ok)":"var(--border)"}`;
      card.style.opacity=done?"0.8":"1";

      if(done){
        card.innerHTML=`
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div style="flex:1;min-width:0;padding-right:8px;">
              <div style="font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${art.name}</div>
              <div class="muted">${art.sku} · <strong style="color:var(--ok)">${committed[art.id]}× kommissioniert</strong></div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">
              <span style="font-size:13px;color:var(--ok);display:flex;align-items:center;gap:4px;"><i class="ti ti-check"></i> Erledigt</span>
              <button class="btn-sm btn-undo" data-id="${art.id}"><i class="ti ti-arrow-back-up"></i> Korrigieren</button>
            </div>
          </div>`;
      } else {
        card.innerHTML=`
          <div style="margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;font-size:13px;">${art.name}</div>
          <div class="muted" style="margin-bottom:10px;">${art.sku} · Lager: ${art.stock}</div>
          <div style="display:flex;align-items:center;gap:8px;">
            <label class="muted" style="white-space:nowrap;">Menge entnehmen:</label>
            <input type="number" class="inp-wh-qty" min="1" value="${qty}" data-id="${art.id}"
              style="width:72px;text-align:center;" />
            <button class="btn btn-commit" data-id="${art.id}" style="white-space:nowrap;">Bestätigen</button>
          </div>`;
      }
      wrap.appendChild(card);
    });

    wrap.querySelectorAll(".inp-wh-qty").forEach(inp=>{
      inp.addEventListener("change",()=>{
        const id=parseInt(inp.dataset.id);
        planned[id]=Math.max(1,parseInt(inp.value)||1);
        saveState();
      });
      inp.addEventListener("keydown",e=>{ if(e.key==="Enter") e.target.blur(); });
    });

    wrap.querySelectorAll(".btn-commit").forEach(b=>b.addEventListener("click",()=>{
      const id=parseInt(b.dataset.id);
      const art=articles.find(a=>a.id===id);
      const qty=planned[id]||0;
      if(!qty) return;
      commitDone[id]=true;
      committed[id]=(committed[id]||0)+qty;
      saveState();
      showNotification(`${qty}× ${art.name} kommissioniert`);
      renderWarehouse();
    }));

    wrap.querySelectorAll(".btn-undo").forEach(b=>b.addEventListener("click",()=>{
      const id=parseInt(b.dataset.id);
      const art=articles.find(a=>a.id===id);
      const qty=planned[id]||0;
      if(!confirm(`Kommissionierung von ${qty}× "${art.name}" rückgängig machen?`)) return;
      delete commitDone[id];
      committed[id]=Math.max(0,(committed[id]||0)-qty);
      if(committed[id]===0) delete committed[id];
      saveState();
      showNotification(`${art.name} zurückgesetzt`,"warn");
      renderWarehouse();
    }));
  }

  // Messelager-Übersicht
  const withCommit=articles.filter(a=>committed[a.id]);
  if(withCommit.length>0){
    const sec=document.createElement("div");
    sec.style.marginTop="20px";
    sec.innerHTML=`<div style="font-size:13px;font-weight:500;margin-bottom:8px;">Messelager-Bestand</div>`;
    const grid=document.createElement("div");
    grid.className="grid2";
    withCommit.forEach(art=>{
      grid.innerHTML+=`<div class="stat"><div class="slabel">${art.name}</div><div class="svalue">${committed[art.id]}</div></div>`;
    });
    sec.appendChild(grid);
    wrap.appendChild(sec);
  }
}

// ── VERKAUF ──────────────────────────────────────────────────────────────
function messeStockQty(artId){
  const sold=salesLists.reduce((s,l)=>s+(l.sold?.[artId]||0),0);
  return (committed[artId]||0)-sold;
}

function renderSales(){
  const wrap=qs("#view-sales");
  wrap.innerHTML="";

  const withStock=articles.filter(a=>committed[a.id]);
  if(withStock.length>0){
    const sec=document.createElement("div");
    sec.style.marginBottom="14px";
    sec.innerHTML=`<div class="muted" style="margin-bottom:6px;">Messelager</div>`;
    const row=document.createElement("div");
    row.className="scroll-row";
    withStock.forEach(art=>{
      row.innerHTML+=`<div class="chip"><div class="csku">${art.sku}</div><div class="cqty">${messeStockQty(art.id)}</div></div>`;
    });
    sec.appendChild(row);
    wrap.appendChild(sec);
  }

  // Listen-Header
  const hdr=document.createElement("div");
  hdr.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;";
  hdr.innerHTML=`<div style="font-weight:500;font-size:13px;">Verkaufslisten</div>`;
  const btnNew=document.createElement("button");
  btnNew.className="btn";
  btnNew.style.cssText="font-size:12px;padding:4px 10px;display:flex;align-items:center;gap:4px;";
  btnNew.innerHTML=`<i class="ti ti-plus"></i> Neue Liste`;
  btnNew.addEventListener("click",()=>{
    const name=prompt("Listenname / Kundenname:");
    if(!name||!name.trim()) return;
    const l={id:Date.now(),name:name.trim(),items:[],sold:{}};
    salesLists.push(l);
    activeListId=l.id;
    saveState(); renderSales();
  });
  hdr.appendChild(btnNew);
  wrap.appendChild(hdr);

  // Listen-Tabs
  if(salesLists.length>0){
    const row=document.createElement("div");
    row.style.cssText="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;";
    salesLists.forEach(l=>{
      const b=document.createElement("button");
      b.className=`pill${activeListId===l.id?" active":""}`;
      b.textContent=l.name;
      b.addEventListener("click",()=>{ activeListId=l.id; saveState(); renderSales(); });
      row.appendChild(b);
    });
    wrap.appendChild(row);
  }

  const activeList=salesLists.find(l=>l.id===activeListId);
  if(!activeList){
    if(salesLists.length===0)
      wrap.innerHTML+=`<div style="text-align:center;padding:24px 0;" class="muted">Noch keine Verkaufslisten.</div>`;
    return;
  }

  // Artikel hinzufügen
  const addSec=document.createElement("div");
  addSec.style.marginBottom="14px";
  addSec.innerHTML=`<div class="muted" style="margin-bottom:6px;">Artikel hinzufügen:</div>`;
  const addRow=document.createElement("div");
  addRow.className="scroll-row";
  articles.forEach(art=>{
    const b=document.createElement("button");
    b.style.cssText="flex-shrink:0;font-size:11px;padding:4px 8px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg);cursor:pointer;color:var(--text);white-space:nowrap;";
    b.textContent=`+ ${art.sku}`;
    b.addEventListener("click",()=>{
      if(activeList.items.find(i=>i.id===art.id)) return;
      activeList.items.push({id:art.id,qty:1,price:art.price});
      saveState(); renderSales();
    });
    addRow.appendChild(b);
  });
  addSec.appendChild(addRow);
  wrap.appendChild(addSec);

  if(activeList.items.length===0){
    wrap.innerHTML+=`<div style="text-align:center;padding:16px 0;" class="muted">Noch keine Artikel in dieser Liste.</div>`;
    return;
  }

  // Artikel-Karten
  activeList.items.forEach(item=>{
    const art=articles.find(a=>a.id===item.id);
    if(!art) return;
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <div style="flex:1;min-width:0;padding-right:8px;">
          <div style="font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${art.name}</div>
          <div class="muted">Min: ${fmtEur(art.minPrice)}${role==="supervisor"?" · Supervisor":""}</div>
        </div>
        <button class="btn-del" data-id="${item.id}" style="border:none;background:none;cursor:pointer;color:var(--text2);font-size:18px;">
          <i class="ti ti-trash"></i>
        </button>
      </div>
      <div class="grid2">
        <div>
          <label class="muted" style="display:block;margin-bottom:2px;">Menge</label>
          <input type="number" class="inp-qty" min="1" value="${item.qty}" data-id="${item.id}" />
        </div>
        <div>
          <label class="muted" style="display:block;margin-bottom:2px;">Preis (€)</label>
          <input type="number" class="inp-price" step="0.01" value="${item.price.toFixed(2)}" data-id="${item.id}" />
        </div>
      </div>
      <div style="margin-top:8px;text-align:right;font-weight:500;font-size:14px;">${fmtEur(item.qty*item.price)}</div>`;
    wrap.appendChild(card);
  });

  wrap.querySelectorAll(".btn-del").forEach(b=>b.addEventListener("click",()=>{
    activeList.items=activeList.items.filter(i=>i.id!==parseInt(b.dataset.id));
    saveState(); renderSales();
  }));
  wrap.querySelectorAll(".inp-qty").forEach(inp=>inp.addEventListener("change",()=>{
    const it=activeList.items.find(i=>i.id===parseInt(inp.dataset.id));
    if(it){ it.qty=Math.max(1,parseInt(inp.value)||1); saveState(); renderSales(); }
  }));
  wrap.querySelectorAll(".inp-qty").forEach(inp=>inp.addEventListener("keydown",e=>{
    if(e.key==="Enter") e.target.blur();
  }));
  wrap.querySelectorAll(".inp-price").forEach(inp=>inp.addEventListener("change",()=>{
    const it=activeList.items.find(i=>i.id===parseInt(inp.dataset.id));
    const art=articles.find(a=>a.id===parseInt(inp.dataset.id));
    if(!it||!art) return;
    const p=parseFloat(inp.value)||0;
    if(p<art.minPrice&&role!=="supervisor"){
      showNotification(`Mindestpreis: ${fmtEur(art.minPrice)}`,"warn");
      it.price=art.minPrice;
    } else { it.price=p; }
    saveState(); renderSales();
  }));

  const total=activeList.items.reduce((s,i)=>s+i.qty*i.price,0);
  const sumRow=document.createElement("div");
  sumRow.style.cssText="border-top:0.5px solid var(--border);padding-top:12px;display:flex;justify-content:space-between;align-items:center;";
  sumRow.innerHTML=`<span style="font-weight:500;">Gesamt</span><span style="font-weight:500;font-size:20px;">${fmtEur(total)}</span>`;
  wrap.appendChild(sumRow);
}

// ── EVENTS ───────────────────────────────────────────────────────────────
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
  currentView=t.dataset.tab; renderView();
}));
document.querySelectorAll(".role-btn").forEach(b=>b.addEventListener("click",()=>{
  role=b.dataset.role;
  document.querySelectorAll(".role-btn").forEach(x=>x.classList.toggle("active",x.dataset.role===role));
  saveState();
}));
document.querySelector(".role-btn[data-role=standard]").classList.add("active");
qs("#btn-reload").addEventListener("click",()=>{
  if(!confirm("Artikelstammdaten neu laden? Geplante Mengen, Messelager und Verkaufslisten bleiben erhalten.")) return;
  loadSheet();
});

// ── START ─────────────────────────────────────────────────────────────────
loadSheet();
</script>
</body>
</html>
