<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messe-Tool</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#fff; --bg2:#f5f5f3; --bg3:#eeecea;
      --text:#1a1a18; --text2:#6b6b67;
      --border:rgba(0,0,0,0.13); --border2:rgba(0,0,0,0.22);
      --info-bg:#e6f1fb; --info:#185fa5;
      --ok-bg:#eaf3de; --ok:#3b6d11;
      --warn-bg:#faeeda; --warn:#854f0b;
      --err-bg:#fcebeb; --err:#a32d2d;
      --r:8px; --rl:12px;
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#1e1e1c; --bg2:#2a2a28; --bg3:#333331;
        --text:#f0ede8; --text2:#a0a09c;
        --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.2);
        --info-bg:#0c447c; --info:#85b7eb;
        --ok-bg:#27500a; --ok:#97c459;
        --warn-bg:#633806; --warn:#ef9f27;
        --err-bg:#791f1f; --err:#f09595;
      }
    }
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;color:var(--text);background:var(--bg3);min-height:100vh;}
    #app{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;}
    input[type=number],input[type=text]{width:100%;padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:14px;}
    input:focus{outline:none;border-color:var(--info);}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer;white-space:nowrap;}
    .btn:active{opacity:.7;}
    .btn-sm{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;border:0.5px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;}
    .btn-sm:active{opacity:.7;}
    .btn-danger{border-color:var(--err);color:var(--err);background:var(--err-bg);}
    .btn-ok{border-color:var(--ok);color:var(--ok);background:var(--ok-bg);}
    .btn-info{border-color:var(--info);color:var(--info);background:var(--info-bg);}
    .card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:12px;margin-bottom:8px;}
    .badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 7px;border-radius:20px;}
    .badge.ok{background:var(--ok-bg);color:var(--ok);}
    .badge.warn{background:var(--warn-bg);color:var(--warn);}
    .badge.info{background:var(--info-bg);color:var(--info);}
    .badge.err{background:var(--err-bg);color:var(--err);}
    .muted{color:var(--text2);font-size:13px;}
    .tabs{display:flex;border-bottom:0.5px solid var(--border);}
    .tab{flex:1;padding:10px 4px;border:none;background:none;cursor:pointer;font-size:11px;color:var(--text2);border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s;}
    .tab.active{color:var(--info);border-bottom-color:var(--info);}
    .tab i{font-size:20px;}
    .notification{margin:8px 16px 0;padding:8px 12px;border-radius:var(--r);font-size:13px;}
    .notif-ok{background:var(--ok-bg);color:var(--ok);}
    .notif-warn{background:var(--warn-bg);color:var(--warn);}
    .notif-err{background:var(--err-bg);color:var(--err);}
    #settings-panel{display:none;padding:12px 16px;border-bottom:0.5px solid var(--border);background:var(--bg2);}
    #view-prep,#view-merkliste,#view-warehouse,#view-sales{display:none;}
    /* Lade-Overlay */
    #loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;}
    #loading-overlay.hidden{display:none;}
    .loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--info);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-step{font-size:14px;color:var(--text2);text-align:center;max-width:280px;}
    .loading-title{font-size:18px;font-weight:600;color:var(--text);}
    .loading-bar-wrap{width:240px;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;}
    .loading-bar{height:100%;background:var(--info);border-radius:2px;transition:width .5s ease;}
    .search-bar{position:relative;margin-bottom:8px;}
    .search-bar input{padding-left:32px;}
    .search-bar i{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:16px;pointer-events:none;}
    .divider{height:0.5px;background:var(--border);margin:12px 0;}
    .chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
    .qty-control{display:flex;align-items:center;gap:6px;}
    .qty-btn{width:30px;height:30px;border-radius:50%;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0;}
    .qty-inp{width:52px;text-align:center;padding:5px 4px;}
    /* Spinner-Pfeile bei number-Input ausblenden */
    .qty-inp::-webkit-outer-spin-button,
    .qty-inp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
    .qty-inp{-moz-appearance:textfield;}
    /* Autocomplete */
    .ac-wrap{position:relative;margin-bottom:8px;}
    .ac-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r);z-index:100;max-height:200px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.12);}
    .ac-item{padding:8px 12px;font-size:13px;cursor:pointer;border-bottom:0.5px solid var(--border);}
    .ac-item:last-child{border-bottom:none;}
    .ac-item:hover,.ac-item.focused{background:var(--info-bg);color:var(--info);}
    /* Filter-Bar */
    .filter-bar{background:var(--bg2);border-radius:var(--rl);padding:10px;margin-bottom:12px;}
    .filter-toggle{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;user-select:none;}
    .filter-toggle input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--info);}
    /* Slave-Card */
    .slave-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:6px;margin-left:12px;border-left:3px solid var(--info);}
    /* Merkliste */
    .merkliste-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .merkliste-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);}
    /* Pagination */
    .pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border);}
  </style>
</head>
<body>
<div id="loading-overlay">
  <i class="ti ti-anchor" style="font-size:36px;color:var(--info);"></i>
  <div class="loading-title">Messe-Tool</div>
  <div class="loading-spinner"></div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar" style="width:0%"></div></div>
  <div class="loading-step" id="loading-step">Initialisiere…</div>
</div>
<div id="app">
  <!-- Messe-Auswahl Dialog -->
  <div id="messe-dialog" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:998;align-items:center;justify-content:center;padding:20px;">
    <div style="background:var(--bg);border-radius:12px;padding:20px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto;">
      <div style="font-weight:600;font-size:16px;margin-bottom:4px;">Messe auswählen</div>
      <div class="muted" style="font-size:13px;margin-bottom:16px;">Wähle eine bestehende Messe oder lege eine neue an.</div>
      <div id="messe-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;"></div>
      <div style="border-top:0.5px solid var(--border);padding-top:16px;">
        <div style="font-size:13px;font-weight:500;margin-bottom:8px;">Neue Messe anlegen</div>
        <input type="text" id="inp-neue-messe" placeholder="z.B. Boot Düsseldorf 2027" style="margin-bottom:8px;" />
        <button id="btn-neue-messe" class="btn btn-info" style="width:100%;">
          <i class="ti ti-plus"></i> Messe anlegen
        </button>
      </div>
    </div>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px 0;">
    <div style="font-weight:600;font-size:17px;display:flex;align-items:center;gap:7px;">
      <i class="ti ti-anchor" style="color:var(--info);font-size:20px;"></i>
      <span>Messe-Tool</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <div style="display:flex;gap:4px;">
        <button class="role-btn btn-sm" data-role="standard"><i class="ti ti-user"></i> Verkäufer</button>
        <button class="role-btn btn-sm" data-role="supervisor"><i class="ti ti-shield-check"></i> Supervisor</button>
      </div>
      <button id="btn-reload" class="btn" style="font-size:12px;padding:3px 8px;display:none;align-items:center;gap:4px;">
        <i class="ti ti-refresh"></i> <span id="art-count">0</span>
      </button>
      <button id="btn-settings" class="btn" style="font-size:12px;padding:3px 8px;">
        <i class="ti ti-settings"></i>
      </button>
    </div>
  </div>

  <!-- Aktuelle Messe prominent unter dem Header -->
  <div style="padding:6px 16px 0;display:flex;align-items:center;justify-content:space-between;">
    <button id="btn-switch-messe" style="background:var(--info);color:#fff;border:none;border-radius:20px;padding:4px 12px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;">
      <i class="ti ti-calendar-event" style="font-size:13px;"></i>
      <span id="messe-label-display">Keine Messe ausgewählt</span>
      <i class="ti ti-chevron-down" style="font-size:11px;opacity:.7;"></i>
    </button>
    <span id="sync-status" style="font-size:11px;display:flex;align-items:center;gap:4px;color:var(--ok);">
      <i class="ti ti-cloud-check" style="font-size:13px;"></i> Synchron
    </span>
  </div>

  <div id="settings-panel">
    <div style="font-size:13px;font-weight:500;margin-bottom:10px;">Einstellungen</div>
    <label class="muted" style="display:block;margin-bottom:2px;">Webhook-URL (Google Apps Script)</label>
    <input type="text" id="inp-webhook" placeholder="https://script.google.com/macros/s/..." style="margin-bottom:8px;" />
    <div style="display:flex;gap:8px;">
      <button id="btn-save-settings" class="btn btn-info" style="flex:1;">Speichern</button>
      <button id="btn-test-webhook" class="btn" style="flex:1;">Webhook testen</button>
    </div>
    <div id="webhook-status" style="margin-top:6px;font-size:12px;"></div>
  </div>

  <div class="tabs" style="margin-top:10px;">
    <button class="tab active" data-tab="prep"><i class="ti ti-clipboard-list"></i>Vorbereitung</button>
    <button class="tab" data-tab="merkliste"><i class="ti ti-star"></i>Merkliste</button>
    <button class="tab" data-tab="warehouse"><i class="ti ti-packages"></i>Kommission</button>
    <button class="tab" data-tab="sales"><i class="ti ti-shopping-cart"></i>Verkauf</button>
  </div>

  <div id="notification-area"></div>

  <div style="padding:12px 16px;">
    <div id="view-prep"></div>
    <div id="view-merkliste"></div>
    <div id="view-warehouse"></div>
    <div id="view-sales"></div>
  </div>
</div>

<script>
// ── KONFIGURATION ──────────────────────────────────────────────────────────
// Spaltenreihenfolge im Google Sheet (0-basiert, Zeile 1 = Header):
// SKU · EAN · NAME · KATEGORIE · EKNETTO · UVPBRUTTO · VKBRUTTO · MINDESTVK · LIEFERANT
// · IMAGE_GROSS · IMAGE_NORMAL · IMAGE_MINI · PRODUCTS_ID · MASTER_ID
// · ZL · CO · ST · FB · HH
const COL = {
  SKU:0, EAN:1, NAME:2, KATEGORIE:3, EKNETTO:4, UVPBRUTTO:5, VKBRUTTO:6, MINDESTVK:7, LIEFERANT:8,
  IMAGE_GROSS:9, IMAGE_NORMAL:10, IMAGE_MINI:11,
  PRODUCTS_ID:12, MASTER_ID:13,
  ZL:14, CO:15, ST:16, FB:17, HH:18
};

const qs = s => document.querySelector(s);

// ── STATE ──────────────────────────────────────────────────────────────────
let articles    = [];   // alle Artikel aus Google Sheets (im Speicher)
let artBySku    = {};   // { sku → article } – schneller Lookup
let slavesBySku = {};   // { master_sku → [slave_article, ...] } – aufgebaut nach dem Laden

let messeLabel  = "";   // aktuelle Messe – leer = noch keine ausgewählt
let WEBHOOK_URL = "";
let role        = "standard";
let currentView = "prep";
let currentUser = "";

// Prep-Filter-State
let prepPage      = 0;
let prepSearch    = "";
let prepLieferant = "";
let prepKategorie = "";
let prepNurLager  = false;
let prepDetailSku = null;

const PAGE_SIZE = 50;

let planned    = {};
let committed  = {};
let commitLog  = {};
let commitDone = {};
let salesLists = [];
let activeSales= null;

let refreshTimer = null;

// ── MESSE-DIALOG ──────────────────────────────────────────────────────────
async function showMesseDialog() {
  const dialog  = qs("#messe-dialog");
  const listEl  = qs("#messe-list");
  dialog.style.display = "flex";
  listEl.innerHTML = `<div class="muted" style="text-align:center;padding:12px;">Lade Messen…</div>`;

  try {
    if (WEBHOOK_URL) {
      const resp = await fetch(WEBHOOK_URL + "?action=messen");
      const json = await resp.json();
      const messen = json.messen || [];

      if (messen.length === 0) {
        listEl.innerHTML = `<div class="muted" style="text-align:center;font-size:13px;">Noch keine Messen vorhanden.</div>`;
      } else {
        listEl.innerHTML = "";
        messen.forEach(m => {
          const btn = document.createElement("button");
          btn.className = "btn" + (m.name === messeLabel ? " btn-info" : "");
          btn.style.cssText = "width:100%;text-align:left;justify-content:space-between;display:flex;align-items:center;";
          const date = m.erstellt ? new Date(m.erstellt).toLocaleDateString("de-DE") : "";
          btn.innerHTML = `<span style="font-weight:500;">${m.name}</span><span class="muted" style="font-size:11px;">${date}</span>`;
          btn.onclick = () => selectMesse(m.name);
          listEl.appendChild(btn);
        });
      }
    } else {
      listEl.innerHTML = `<div class="muted" style="font-size:13px;">Bitte zuerst Webhook-URL in den Einstellungen eintragen.</div>`;
    }
  } catch(e) {
    listEl.innerHTML = `<div style="color:var(--err);font-size:13px;">Fehler: ${e.message}</div>`;
  }
}

async function selectMesse(name) {
  messeLabel = name;
  qs("#messe-label-display").textContent = name;
  qs("#messe-dialog").style.display = "none";
  saveUIState();
  planned = {}; committed = {}; commitLog = {}; commitDone = {};
  showNotification(`Messe "${name}" ausgewählt`, "ok");
  await loadRemoteState(false);
  startAutoRefresh();
  renderView();
}

qs("#btn-switch-messe").addEventListener("click", () => showMesseDialog());

qs("#btn-neue-messe").addEventListener("click", async () => {
  const name = qs("#inp-neue-messe").value.trim();
  if (!name) { showNotification("Bitte einen Messe-Namen eingeben", "warn"); return; }
  await selectMesse(name);
  qs("#inp-neue-messe").value = "";
});

// ── UUID GENERATOR ────────────────────────────────────────────────────────
function genUUID() {
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

// ── PERSISTENZ (nur UI-State und Einstellungen) ───────────────────────────
function saveUIState() {
  const s = {
    salesLists, activeSales,
    messeLabel, WEBHOOK_URL, role, currentUser,
    merklisteCollapsed, masterCollapsed
  };
  try { localStorage.setItem("messetool_ui", JSON.stringify(s)); } catch(e){}
}

function loadUIState() {
  try {
    const raw = localStorage.getItem("messetool_ui");
    const src = raw ? JSON.parse(raw) : null;
    if (!src) return;
    salesLists  = src.salesLists  || [];
    activeSales = src.activeSales || null;
    messeLabel  = src.messeLabel  || "";
    WEBHOOK_URL = src.WEBHOOK_URL || "";
    role        = src.role        || "standard";
    currentUser = src.currentUser || "";
    if (src.merklisteCollapsed) merklisteCollapsed = src.merklisteCollapsed;
    if (src.masterCollapsed)    masterCollapsed    = src.masterCollapsed;
  } catch(e){}
}

function saveState() { saveUIState(); }

// ── STATE VOM SCRIPT LADEN ────────────────────────────────────────────────
// ── SYNC-QUEUE (Offline-First) ────────────────────────────────────────────
// Änderungen werden zuerst lokal gequeued, dann gebündelt synchronisiert.
// Der angezeigte State ist immer: serverState + noch ausstehende Queue-Einträge.
const SYNC_QUEUE_KEY     = "messetool_sync_queue";
const SYNC_BATCH_MS      = 6000;   // alle 6s ausstehende Einträge senden
const SYNC_DEBOUNCE_MS   = 2000;   // 2s nach letzter Änderung an einer SKU warten
const AUTO_REFRESH_MS    = 30000;

let syncQueue       = [];     // [{ localId, action, payload, debounceKey, createdAt }]
let syncStatus       = "idle"; // idle | pending | syncing | error
let syncTimer        = null;
let debounceTimers    = {};    // { debounceKey: timeoutHandle }
let lastSyncError     = null;

function loadSyncQueue() {
  try {
    const raw = localStorage.getItem(SYNC_QUEUE_KEY);
    syncQueue = raw ? JSON.parse(raw) : [];
  } catch(e) { syncQueue = []; }
}
function persistSyncQueue() {
  try { localStorage.setItem(SYNC_QUEUE_KEY, JSON.stringify(syncQueue)); } catch(e){}
}

// Fügt eine Änderung zur Queue hinzu. debounceKey gruppiert schnelle Folgeänderungen
// an derselben SKU/Aktion (z.B. mehrfaches Klicken auf +) zu einem Eintrag.
function queueChange(action, payload, debounceKey) {
  if (debounceKey) {
    // Bestehenden Eintrag mit gleichem debounceKey ersetzen statt neuen anzulegen
    const idx = syncQueue.findIndex(q => q.debounceKey === debounceKey && !q.sending);
    if (idx >= 0) {
      syncQueue[idx] = { ...syncQueue[idx], action, payload, createdAt: Date.now() };
      persistSyncQueue();
      updateSyncStatusUI();
      scheduleDebouncedSync(debounceKey);
      return;
    }
  }
  syncQueue.push({
    localId: genUUID(),
    action, payload, debounceKey,
    createdAt: Date.now(),
  });
  persistSyncQueue();
  updateSyncStatusUI();
  scheduleDebouncedSync(debounceKey);
}

// Wartet SYNC_DEBOUNCE_MS nach der letzten Änderung an diesem Key, dann synct
function scheduleDebouncedSync(debounceKey) {
  const key = debounceKey || "__immediate__";
  if (debounceTimers[key]) clearTimeout(debounceTimers[key]);
  debounceTimers[key] = setTimeout(() => {
    delete debounceTimers[key];
    syncNow();
  }, debounceKey ? SYNC_DEBOUNCE_MS : 300);
}

// Sendet alle ausstehenden (nicht gerade sendenden) Queue-Einträge als Batch
async function syncNow() {
  if (!WEBHOOK_URL) return;
  const pending = syncQueue.filter(q => !q.sending);
  if (pending.length === 0) return;

  pending.forEach(q => q.sending = true);
  syncStatus = "syncing";
  updateSyncStatusUI();

  try {
    // Apps Script Web-Apps senden bei doPost keine CORS-Header zurück,
    // daher no-cors verwenden. Wir können die Antwort nicht lesen, aber
    // ein erfolgreicher fetch() ohne Netzwerkfehler bedeutet der Request
    // ist beim Server angekommen (Google empfängt und verarbeitet ihn serverseitig).
    await fetch(WEBHOOK_URL, {
      method:  "POST",
      mode:    "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body:    (() => { const b = JSON.stringify({ action: "BATCH", messe: messeLabel, user: currentUser, items: pending.map(q => ({ action: q.action, ...q.payload, uuid: q.localId })) }); console.log("SYNC BODY:", b); return b; })(),
    });

    // Optimistisch: kein Netzwerkfehler = wahrscheinlich angekommen.
    // Erfolgreich gesendete Einträge aus der Queue entfernen.
    const sentIds = new Set(pending.map(q => q.localId));
    syncQueue = syncQueue.filter(q => !sentIds.has(q.localId));
    persistSyncQueue();
    lastSyncError = null;
    syncStatus = syncQueue.length > 0 ? "pending" : "idle";

  } catch(e) {
    console.warn("syncNow Fehler:", e);
    pending.forEach(q => q.sending = false);
    persistSyncQueue();
    if (lastSyncError !== e.message) {
      // Nur bei neuer/erster Fehlermeldung eine Notification zeigen (kein Spam bei Wiederholungen)
      showNotification("Sync-Fehler: " + e.message, "err");
    }
    lastSyncError = e.message;
    syncStatus = "error";
    // Erneuter Versuch nach kurzer Pause
    setTimeout(syncNow, 8000);
  }
  updateSyncStatusUI();
}

// Periodischer Sicherheitsnetz-Sync (falls Debounce-Timer durch Tab-Wechsel verloren ging)
function startSyncLoop() {
  stopSyncLoop();
  syncTimer = setInterval(syncNow, SYNC_BATCH_MS);
}
function stopSyncLoop() {
  if (syncTimer) { clearInterval(syncTimer); syncTimer = null; }
}

// Wendet ausstehende Queue-Einträge auf einen frisch geladenen Server-State an,
// damit lokale Änderungen nie durch einen Refresh überschrieben werden.
function applyPendingQueueToState() {
  syncQueue.forEach(q => {
    const sku = q.payload.sku;
    if (!sku) return;
    switch (q.action) {
      case "PLAN_SET":
        if (q.payload.qty > 0) planned[sku] = q.payload.qty;
        else delete planned[sku];
        break;
      case "REMOVE":
        delete planned[sku];
        break;
      case "COMMIT":
        committed[sku] = (committed[sku] || 0) + q.payload.qty;
        break;
      case "COMMIT_UNDO":
        committed[sku] = Math.max(0, (committed[sku] || 0) - q.payload.undoQty);
        if (committed[sku] === 0) delete committed[sku];
        break;
    }
  });
}

// ── STATE VOM SERVER LADEN (mit Queue-Schutz) ─────────────────────────────
async function loadRemoteState(silent = false) {
  if (!WEBHOOK_URL) return;
  if (!silent) showNotification("Lade aktuellen Stand…", "ok");
  try {
    const url  = WEBHOOK_URL + "?action=load&messe=" + encodeURIComponent(messeLabel);
    const resp = await fetch(url);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const json = await resp.json();
    if (!json.ok) throw new Error(json.error || "Fehler");

    const s = json.state || {};
    planned   = s.planned   || {};
    committed = s.committed || {};
    commitLog = s.commitLog || {};

    // Ausstehende lokale Änderungen erneut anwenden, damit sie nicht
    // durch den frisch geladenen Server-Stand überschrieben werden
    applyPendingQueueToState();

    commitDone = {};
    Object.keys(planned).forEach(sku => {
      if ((committed[sku] || 0) >= planned[sku]) commitDone[sku] = true;
    });

    if (!silent) showNotification("Stand aktualisiert");
    renderView();
  } catch(e) {
    if (!silent) showNotification("Fehler beim Laden: " + e.message, "err");
    console.warn("loadRemoteState:", e);
  }
}

// ── ARTIKEL LADEN (BigQuery via Apps Script) ──────────────────────────────
async function loadArticles(forceReload = false) {
  showLoading();

  try {
    // Cache prüfen
    if (!forceReload) {
      setLoadingStep("Prüfe Artikel-Cache…", 10);
      await sleep(200);
      const cached = getCachedArticles();
      if (cached && cached.length > 0) {
        setLoadingStep(`Cache gefunden – ${cached.length} Artikel laden…`, 40);
        await sleep(100);
        buildArticleLookups(cached);
        setLoadingStep(`${articles.length} Artikel aus Cache geladen`, 70);
        await sleep(100);
        return true;
      }
    }

    // BigQuery via Apps Script laden (nur Basisdaten: SKU/EAN/Name/Kategorie/Lieferant/MasterID)
    if (!WEBHOOK_URL) {
      hideLoading();
      showNotification("Bitte zuerst die Webhook-URL in den Einstellungen hinterlegen.", "warn");
      return false;
    }

    setLoadingStep("Verbinde mit BigQuery…", 15);
    await sleep(200);

    setLoadingStep("Lade Artikel-Basisdaten…", 25);

    let fakeProgress = 25;
    const progressInterval = setInterval(() => {
      fakeProgress = Math.min(fakeProgress + 1, 75);
      qs("#loading-bar") && (qs("#loading-bar").style.width = fakeProgress + "%");
    }, 300);

    const resp = await fetch(WEBHOOK_URL + "?action=articles_basic");
    clearInterval(progressInterval);

    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const json = await resp.json();
    if (!json.ok) throw new Error(json.error || "BigQuery-Fehler");

    const rawArticles = json.articles || [];
    setLoadingStep(`${rawArticles.length} Artikel empfangen – verarbeite…`, 80);
    await sleep(100);

    setCachedArticles(rawArticles);
    buildArticleLookups(rawArticles);
    setLoadingStep(`${articles.length} Artikel bereit`, 95);
    await sleep(200);

    return true;

  } catch(e) {
    hideLoading();
    showNotification("Fehler beim Laden: " + e.message, "err");
    console.error("loadArticles:", e);
    return false;
  }
}

function buildArticleLookups(rawArticles) {
  articles    = rawArticles;
  artBySku    = {};
  slavesBySku = {};
  articles.forEach(a => {
    // Detail-Felder mit Defaults initialisieren, werden bei Bedarf nachgeladen
    if (a.price === undefined) {
      a.costPrice = 0; a.uvp = 0; a.price = 0; a.minPrice = 0;
      a.image = ""; a.stocks = { zl:0, co:0, st:0, fb:0, hh:0 }; a.stock = 0;
      a._detailLoaded = false;
    }
    artBySku[a.sku] = a;
  });
  articles.forEach(a => {
    if (a.masterId) {
      if (!slavesBySku[a.masterId]) slavesBySku[a.masterId] = [];
      slavesBySku[a.masterId].push(a);
    }
  });
  qs("#art-count").textContent = articles.length;
  qs("#btn-reload").style.display = "flex";
}

// ── DETAILDATEN NACHLADEN (Preise, Lager, Bild) ───────────────────────────
// Cache verhindert wiederholtes Nachladen bereits bekannter SKUs
const detailLoadingInFlight = new Set(); // verhindert parallele Doppel-Requests

async function ensureDetailsLoaded(skus, onUpdate) {
  if (!WEBHOOK_URL || skus.length === 0) return;

  // Nur SKUs die noch nicht geladen sind und nicht gerade laden
  const missing = skus.filter(sku => {
    const art = artBySku[sku];
    return art && !art._detailLoaded && !detailLoadingInFlight.has(sku);
  });
  if (missing.length === 0) return;

  missing.forEach(sku => detailLoadingInFlight.add(sku));

  try {
    // BigQuery IN-Klausel verträgt max. 200 SKUs pro Anfrage -> in Batches aufteilen
    const batchSize = 150;
    for (let i = 0; i < missing.length; i += batchSize) {
      const batch = missing.slice(i, i + batchSize);
      const url = WEBHOOK_URL + "?action=articles_detail&skus=" + encodeURIComponent(batch.join(","));
      const resp = await fetch(url);
      if (!resp.ok) continue;
      const json = await resp.json();
      if (!json.ok) continue;

      const details = json.details || {};
      Object.keys(details).forEach(sku => {
        const art = artBySku[sku];
        if (!art) return;
        const d = details[sku];
        art.costPrice  = d.costPrice;
        art.uvp        = d.uvp;
        art.price      = d.price;
        art.minPrice   = d.minPrice;
        art.image      = d.image;
        art.stocks     = d.stocks;
        art.stock      = d.stock;
        art._detailLoaded = true;
      });
    }
    if (onUpdate) onUpdate();
  } catch(e) {
    console.warn("ensureDetailsLoaded:", e);
  } finally {
    missing.forEach(sku => detailLoadingInFlight.delete(sku));
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Hilfsfunktionen Master/Slave

// parseCSV bleibt für eventuelle Kompatibilität
function parseCSV(text) {
  const rows = [];
  let row = [], cell = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (c === '"') inQ = false;
      else cell += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(cell); cell = ""; }
      else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ""; }
      else if (c !== '\r') cell += c;
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

// ── AUTOCOMPLETE HELPER ───────────────────────────────────────────────────
function makeAutocomplete(inputEl, dropEl, getItems, onSelect) {
  let focusIdx = -1;
  inputEl.addEventListener("input", () => {
    const val = inputEl.value.trim().toLowerCase();
    focusIdx = -1;
    if (!val) { dropEl.style.display = "none"; return; }
    const matches = getItems().filter(s => s.toLowerCase().includes(val)).slice(0, 50);
    if (!matches.length) { dropEl.style.display = "none"; return; }
    dropEl.innerHTML = matches.map((m, i) => `<div class="ac-item" data-idx="${i}">${m}</div>`).join("");
    dropEl.style.display = "block";
    dropEl.querySelectorAll(".ac-item").forEach(item => {
      item.addEventListener("mousedown", e => {
        e.preventDefault();
        inputEl.value = item.textContent;
        dropEl.style.display = "none";
        onSelect(item.textContent);
      });
    });
  });
  inputEl.addEventListener("keydown", e => {
    const items = dropEl.querySelectorAll(".ac-item");
    if (!items.length) return;
    if (e.key === "ArrowDown") focusIdx = Math.min(focusIdx + 1, items.length - 1);
    else if (e.key === "ArrowUp") focusIdx = Math.max(focusIdx - 1, 0);
    else if (e.key === "Enter" && focusIdx >= 0) {
      e.preventDefault();
      inputEl.value = items[focusIdx].textContent;
      dropEl.style.display = "none";
      onSelect(items[focusIdx].textContent);
      return;
    } else return;
    items.forEach((it, i) => it.classList.toggle("focused", i === focusIdx));
    items[focusIdx]?.scrollIntoView({ block: "nearest" });
  });
  inputEl.addEventListener("blur", () => setTimeout(() => dropEl.style.display = "none", 150));
}

let merklisteCollapsed = {}; // { [kategorie]: bool } – zugeklappte Kategorien
let masterCollapsed    = {}; // { [masterSku]: bool } – zugeklappte Master-Karten

function renderMerklisteView() {
  const wrap = qs("#view-merkliste");

  if (merklisteDetailSku) {
    renderDetailView(wrap, merklisteDetailSku, () => { merklisteDetailSku = null; renderMerklisteView(); });

  }

  // Alle geplanten Nicht-Master-Artikel
  const geplant = articles.filter(a => (planned[a.sku] || 0) > 0 && !isMaster(a));

  wrap.innerHTML = "";

  if (geplant.length === 0) {
    wrap.innerHTML = `<div class="muted" style="text-align:center;padding:32px 0;">
      <i class="ti ti-star" style="font-size:36px;display:block;margin-bottom:10px;opacity:.4;"></i>
      Noch keine Artikel geplant.<br>
      <span style="font-size:12px;">Artikel in der Vorbereitung suchen und Menge setzen.</span>
    </div>`;
    return;
  }

  // Gesamt-Statistik
  const totalPlanned = geplant.length;
  const totalDone    = geplant.filter(a => commitDone[a.sku]).length;
  const hdr = document.createElement("div");
  hdr.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;";

    <span style="font-weight:600;font-size:14px;">Merkliste</span>
    <span class="muted">${totalDone}/${totalPlanned} komm.</span>`;
  wrap.appendChild(hdr);

  // Details für alle geplanten Artikel sicherstellen (Merkliste ist meist klein genug)
  const plannedSkus = geplant.map(a => a.sku);
  ensureDetailsLoaded(plannedSkus, () => renderMerklisteView());

  // Artikel nach Kategorie gruppieren
  // Master-Artikel als Gruppenträger; bei Slaves die Kategorie vom Slave selbst nehmen
  const byCategory = {};
  geplant.forEach(slave => {
    const cat = slave.category || "Sonstige";
    if (!byCategory[cat]) byCategory[cat] = new Set();
    byCategory[cat].add(slave);
  });

  // Kategorien alphabetisch sortieren
  const categories = Object.keys(byCategory).sort((a, b) => a.localeCompare(b, "de"));

  categories.forEach(cat => {
    const slaves = [...byCategory[cat]];

    // Kategorie-Statistik – live berechnet
    const catDone  = slaves.filter(a => (planned[a.sku] || 0) > 0 && (committed[a.sku] || 0) >= (planned[a.sku] || 0)).length;
    const catOffen = slaves.filter(a => !((committed[a.sku] || 0) >= (planned[a.sku] || 0))).length;
    const catCollapsed = merklisteCollapsed[cat] || false;

    // Kategorie-Header
    const catHdr = document.createElement("div");
    catHdr.style.cssText = "display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg2);border-radius:var(--r);cursor:pointer;margin-bottom:6px;border:0.5px solid var(--border);";
    catHdr.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;">
        <i class="ti ti-tag" style="font-size:13px;color:var(--text2);" aria-hidden="true"></i>
        <span style="font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);">${cat}</span>

        ${catOffen > 0 ? `<span class="badge warn"><i class="ti ti-clock" style="font-size:9px;"></i> ${catOffen} offen</span>` : ""}
        <i class="ti ti-chevron-down" style="font-size:14px;color:var(--text2);transition:transform .2s;transform:${catCollapsed ? "rotate(-90deg)" : "rotate(0deg)"};"></i>
      </div>`;
    catHdr.addEventListener("click", () => {
      merklisteCollapsed[cat] = !merklisteCollapsed[cat];
      renderMerklisteView();
    });
    wrap.appendChild(catHdr);

    if (catCollapsed) return;

    // Slaves nach Master gruppieren
    const masterGroups = {}; // { masterSku|"__solo__sku": [slave, ...] }
    slaves.forEach(slave => {
      const master = getMasterOf(slave);
      const key = master ? master.sku : `__solo__${slave.sku}`;
      if (!masterGroups[key]) masterGroups[key] = { master, slaves: [] };
      masterGroups[key].slaves.push(slave);
    });

    // Master-Gruppen sortieren: nach Master-Name
    const groupKeys = Object.keys(masterGroups).sort((a, b) => {
      const na = masterGroups[a].master ? masterGroups[a].master.name : (masterGroups[a].slaves[0]?.name || "");
      const nb = masterGroups[b].master ? masterGroups[b].master.name : (masterGroups[b].slaves[0]?.name || "");
      return na.localeCompare(nb, "de");
    });

    groupKeys.forEach(key => {
      const { master, slaves: groupSlaves } = masterGroups[key];
      _renderMasterGroup(wrap, master, groupSlaves);
    });
  });
}

function _renderMasterGroup(wrap, master, plannedSlaves) {
  // Alle Slaves des Masters (geplant + nicht geplant)
  const allSlaves = master ? getSlavesOf(master) : plannedSlaves;
  const unplannedSlaves = allSlaves.filter(a => !(planned[a.sku] || 0));

  const anyDone   = plannedSlaves.some(a => (planned[a.sku] || 0) > 0 && (committed[a.sku] || 0) >= (planned[a.sku] || 0));
  const pct       = totalQty > 0 ? Math.round((totalComm / totalQty) * 100) : 0;

  const masterSku     = master ? master.sku : plannedSlaves[0]?.sku;
  const masterName    = master ? master.name : (plannedSlaves[0]?.name || "");

      : `<div style="width:44px;height:44px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="ti ti-photo-off" style="font-size:18px;color:var(--text2);"></i></div>`}
    <div style="flex:1;min-width:0;">
      <div style="font-size:13px;font-weight:500;line-height:1.35;">${masterName}</div>
      <div class="muted" style="margin-top:1px;">${plannedSlaves.length} Variante(n) geplant · <span style="color:${allDone ? "var(--ok)" : "var(--warn)"};">${allDone ? "alle komm." : totalComm + "/" + totalQty + " komm."}</span></div>
    </div>
    <i class="ti ti-chevron-down" style="font-size:16px;color:var(--text2);flex-shrink:0;transition:transform .2s;transform:${isCollapsed ? "rotate(-90deg)" : "rotate(0deg)"};"></i>`;
  masterHdr.addEventListener("click", () => {
    masterCollapsed[masterSku] = !masterCollapsed[masterSku];
    renderMerklisteView();
  });
  card.appendChild(masterHdr);

  // Fortschrittsbalken
  const progDiv = document.createElement("div");
  progDiv.style.cssText = "display:flex;gap:6px;padding:0 12px 10px;align-items:center;";
  progDiv.innerHTML = `
    <span style="font-size:11px;color:${allDone ? "var(--ok)" : "var(--warn)"};">${totalComm}/${totalQty}</span>
    <div style="flex:1;height:4px;border-radius:2px;background:var(--bg2);overflow:hidden;">
      <div style="height:100%;border-radius:2px;background:${allDone ? "var(--ok)" : "var(--warn)"};width:${pct}%;"></div>
    </div>
    ${allDone
      ? `<span class="badge ok"><i class="ti ti-check" style="font-size:9px;"></i> Fertig</span>`
      : `<span class="badge warn"><i class="ti ti-clock" style="font-size:9px;"></i> Offen</span>`}`;
  card.appendChild(progDiv);

  if (isCollapsed) { wrap.appendChild(card); return; }

  // Slaves-Bereich
  const slavesWrap = document.createElement("div");
  slavesWrap.style.cssText = "border-top:0.5px solid var(--border);";

  // Geplante Slaves zuerst – sortiert: fertig zuerst, dann offen
  const sortedPlanned = [...plannedSlaves].sort((a, b) => {
    const aDone = (planned[a.sku] || 0) > 0 && (committed[a.sku] || 0) >= (planned[a.sku] || 0);
    const bDone = (planned[b.sku] || 0) > 0 && (committed[b.sku] || 0) >= (planned[b.sku] || 0);
    if (aDone && !bDone) return -1;
    if (!aDone && bDone) return 1;
    return a.name.localeCompare(b.name, "de");
  });

  const divPlanned = document.createElement("div");
  divPlanned.style.cssText = "font-size:10px;color:var(--text2);padding:5px 12px;background:var(--bg2);border-bottom:0.5px solid var(--border);";
  divPlanned.textContent = "Geplant & kommissioniert";
  slavesWrap.appendChild(divPlanned);

  sortedPlanned.forEach(slave => _renderSlaveRow(slavesWrap, slave, true));

  // Ungeplante Slaves darunter
  if (unplannedSlaves.length > 0) {
    const divUnplanned = document.createElement("div");
    divUnplanned.style.cssText = "font-size:10px;color:var(--text2);padding:5px 12px;background:var(--bg2);border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border);";
    divUnplanned.textContent = `Weitere Varianten (${unplannedSlaves.length})`;
    slavesWrap.appendChild(divUnplanned);
    unplannedSlaves.sort((a, b) => a.name.localeCompare(b.name, "de"))
                   .forEach(slave => _renderSlaveRow(slavesWrap, slave, false));
  }

  card.appendChild(slavesWrap);
  wrap.appendChild(card);
}

function _renderSlaveRow(container, slave, isPlanned) {
  const sku    = slave.sku;
  const qty    = planned[sku] || 0;
  const comm   = committed[sku] || 0;
  // done live berechnen: committed >= planned (und qty > 0), nicht nur auf commitDone-Flag verlassen
  const done   = qty > 0 && comm >= qty;
  // commitDone konsistent halten
  if (done) commitDone[sku] = true;
  else delete commitDone[sku];
  const offen  = Math.max(0, qty - comm);

  const row = document.createElement("div");
  row.style.cssText = `padding:8px 12px;border-bottom:0.5px solid var(--border);background:${
    done ? "#eaf3de" : (isPlanned && comm > 0 ? "#faeeda" : "var(--bg)")};`;

  const nameColor = done ? "#27500a" : (isPlanned && !done ? "#633806" : "var(--text)");
  const metaColor = "var(--text2)";

  // Bild + Info
  const topRow = document.createElement("div");
  topRow.style.cssText = "display:flex;gap:8px;align-items:flex-start;";
  topRow.innerHTML = `
    ${slave.image
      ? `<img src="${slave.image}" loading="lazy" style="width:40px;height:40px;object-fit:contain;border-radius:6px;border:0.5px solid var(--border);background:var(--bg2);flex-shrink:0;" onerror="this.style.display='none'" />`
      : `<div style="width:40px;height:40px;border-radius:6px;border:0.5px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="ti ti-photo-off" style="font-size:14px;color:var(--text2);"></i></div>`}
    <div style="flex:1;min-width:0;">
      <div style="font-size:12px;font-weight:500;line-height:1.35;color:${nameColor};">${slave.name}</div>
      <div style="font-size:11px;color:${metaColor};margin-top:1px;">${slave.sku}${slave.ean ? " · " + slave.ean : ""}</div>
      ${stockGrid(slave.stocks, true)}
      ${isPlanned ? `<div style="font-size:11px;color:${done ? "#3b6d11" : "#854f0b"};margin-top:4px;">${comm}/${qty} komm.${!done ? ` · ${offen} offen` : ""}</div>` : ""}
    </div>`;
  row.appendChild(topRow);

  // Unterste Zeile: volle Breite
  const bottomRow = document.createElement("div");
  bottomRow.style.cssText = "margin-top:8px;";

  if (done) {
    // Rückgängig-Button
    const undoBtn = document.createElement("button");
    undoBtn.style.cssText = "display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:7px 10px;border-radius:var(--r);border:0.5px solid var(--ok);background:var(--ok-bg);color:var(--ok);font-size:12px;cursor:pointer;";
    undoBtn.innerHTML = `<i class="ti ti-arrow-back-up" style="font-size:14px;"></i> Kommissionierung rückgängig`;
    undoBtn.addEventListener("click", async () => {
      const lastEntry = (commitLog[sku] || []).at(-1);
      if (!confirm(`Letzte Kommissionierung von "${slave.name}" rückgängig machen?`)) return;
      const undoQty = lastEntry ? lastEntry.qty : (committed[sku] || 0);
      commitLog[sku] = (commitLog[sku] || []).slice(0, -1);
      committed[sku] = Math.max(0, (committed[sku] || 0) - undoQty);
      if (committed[sku] === 0) delete committed[sku];
      delete commitDone[sku];
      saveState();
      showNotification(`${slave.name} – Kommissionierung rückgängig`, "warn");
      await sendWebhook("COMMIT_UNDO", { sku, art: slave, undoQty });
      renderMerklisteView();
    });
    bottomRow.appendChild(undoBtn);
  } else {
    // Qty-Control volle Breite
    const borderCol = isPlanned ? "var(--warn)" : "var(--border2)";
    const qtyWrap = document.createElement("div");
    qtyWrap.style.cssText = "display:flex;align-items:center;gap:6px;";
    qtyWrap.innerHTML = `
      <button class="qty-btn" data-sku="${sku}" data-dir="-1" style="border-color:${borderCol};flex-shrink:0;">−</button>
      <input class="qty-inp" type="number" min="0" value="${qty}" data-sku="${sku}" style="flex:1;border-color:${borderCol};" />
      <button class="qty-btn" data-sku="${sku}" data-dir="1" style="border-color:${borderCol};flex-shrink:0;">+</button>`;
    qtyWrap.querySelectorAll(".qty-btn").forEach(b => b.addEventListener("click", () => {
      const s = b.dataset.sku, dir = parseInt(b.dataset.dir);
      const old = planned[s] || 0;
      const neu = Math.max(0, old + dir);
      if (neu === 0) delete planned[s]; else planned[s] = neu;
      saveState(); renderMerklisteView();
      sendPlanWebhook(s, old, neu, slave);
    }));
    qtyWrap.querySelector(".qty-inp").addEventListener("change", function() {
      const s = this.dataset.sku;
      const old = planned[s] || 0;
      const neu = Math.max(0, parseInt(this.value) || 0);
      if (neu === 0) delete planned[s]; else planned[s] = neu;
      saveState(); renderMerklisteView();
      sendPlanWebhook(s, old, neu, slave);
    });
    bottomRow.appendChild(qtyWrap);
  }

  row.appendChild(bottomRow);
  container.appendChild(row);
}

// ── GETEILTE DETAILANSICHT (Prep + Merkliste nutzen dieselbe Funktion) ─────
function renderDetailView(wrap, detailSku, onBack) {
  try {
    const art = articles.find(a => a.sku === detailSku);
    if (!art) {
      console.warn("renderDetailView: Artikel nicht gefunden für SKU:", detailSku);
      onBack(); return;
    }
    _renderDetailViewInner(wrap, art, onBack);
  } catch(e) {
    console.error("renderDetailView Fehler:", e);
    wrap.innerHTML = `<div class="muted" style="padding:20px 0;text-align:center;">Fehler beim Laden: ${e.message}</div>`;
    const backBtn = document.createElement("button");
    backBtn.className = "btn btn-sm";
    backBtn.style.marginBottom = "12px";
    backBtn.innerHTML = `<i class="ti ti-arrow-left"></i> Zurück`;
    backBtn.onclick = onBack;
    wrap.insertBefore(backBtn, wrap.firstChild);
  }
}

function _renderDetailViewInner(wrap, art, onBack) {

  const qty = planned[art.sku] || 0;

  // Alle Geschwister ermitteln:
  // Falls der angeklickte Artikel selbst eine masterId hat → alle mit gleicher masterId
  // Falls der angeklickte Artikel ein Master ist (hat Slaves) → alle seine Slaves
  let siblings = [];
  if (art.masterId) {
    // Slave angeklickt → alle Artikel mit gleicher masterId (außer sich selbst)
    siblings = articles.filter(a => a.masterId === art.masterId && a.sku !== art.sku);
  } else if (isMaster(art)) {
    // Master angeklickt → alle Slaves
    siblings = getSlavesOf(art);
  }
  siblings.sort((a, b) => a.name.localeCompare(b.name, "de"));

  wrap.innerHTML = "";

  const backBtn = document.createElement("button");
  backBtn.className = "btn btn-sm";
  backBtn.style.marginBottom = "12px";
  backBtn.innerHTML = `<i class="ti ti-arrow-left"></i> Zurück`;
  backBtn.onclick = onBack;
  wrap.appendChild(backBtn);

  // Angeklickten Artikel hervorgehoben anzeigen
  const mainCard = document.createElement("div");
  mainCard.style.cssText = "background:var(--info-bg);border:1.5px solid var(--info);border-radius:var(--rl);padding:12px;margin-bottom:12px;";
  mainCard.dataset.sku = art.sku;
  mainCard.innerHTML = `
    <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:10px;">
      ${imgTag(art, 72)}
      <div style="flex:1;min-width:0;">
        <div style="font-weight:600;font-size:14px;line-height:1.3;margin-bottom:3px;">${art.name}</div>
        <div class="muted">${art.sku}${art.ean ? " · " + art.ean : ""}</div>
        <div class="muted">${art.category} · ${art.supplier}</div>
        <div style="display:flex;gap:8px;margin-top:6px;">
          <div style="flex:1;background:var(--bg);border-radius:var(--r);padding:5px 8px;">
            <div style="font-size:10px;color:var(--text2);">VK</div>
            <div style="font-size:15px;font-weight:500;" class="detail-price-vk">${art._detailLoaded ? fmtEur(art.price) : "…"}</div>
          </div>
          <div style="flex:1;background:var(--bg);border-radius:var(--r);padding:5px 8px;">
            <div style="font-size:10px;color:var(--text2);">Min-VK</div>
            <div style="font-size:15px;font-weight:500;" class="detail-price-min">${art._detailLoaded ? fmtEur(art.minPrice) : "…"}</div>
          </div>
        </div>
      </div>
    </div>
    <div class="detail-stock">${art._detailLoaded ? stockGrid(art.stocks, false) : `<div class="muted" style="font-size:12px;opacity:.5;padding:6px 0;">Lagerbestand wird geladen…</div>`}</div>
    <div style="padding-top:10px;border-top:0.5px solid var(--border);">
      <div class="muted" style="font-size:12px;margin-bottom:6px;">Menge planen:</div>
      <div class="qty-control">
        <button class="qty-btn" id="d-minus" data-sku="${art.sku}" data-dir="-1">−</button>
        <input class="qty-inp" type="number" min="0" value="${qty}" id="d-qty" data-sku="${art.sku}" style="width:60px;" />
        <button class="qty-btn" id="d-plus" data-sku="${art.sku}" data-dir="1">+</button>
      </div>
    </div>`;
  wrap.appendChild(mainCard);

  // Geschwister-Header
  if (siblings.length > 0) {
    const hdr = document.createElement("div");
    hdr.className = "merkliste-title";
    hdr.style.marginBottom = "8px";
    hdr.textContent = `Weitere Varianten (${siblings.length})`;
    wrap.appendChild(hdr);
  }

  const slavesWrap = document.createElement("div");
  slavesWrap.id = "detail-slaves";
  wrap.appendChild(slavesWrap);

  // Qty für angeklickten Artikel – jetzt sicher im DOM
  const updateMainQty = (sku, neu) => {
    const old = planned[sku] || 0;
    if (neu === 0) delete planned[sku]; else planned[sku] = neu;
    saveState();
    sendPlanWebhook(sku, old, neu, art);
  };
  const dMinus = wrap.querySelector("#d-minus");
  const dPlus  = wrap.querySelector("#d-plus");
  const dQty   = wrap.querySelector("#d-qty");
  if (dMinus) dMinus.onclick = () => {
    const neu = Math.max(0, (planned[art.sku] || 0) - 1);
    if (dQty) dQty.value = neu; updateMainQty(art.sku, neu);
  };
  if (dPlus) dPlus.onclick = () => {
    const neu = (planned[art.sku] || 0) + 1;
    if (dQty) dQty.value = neu; updateMainQty(art.sku, neu);
  };
  if (dQty) dQty.addEventListener("change", function() {
    updateMainQty(art.sku, Math.max(0, parseInt(this.value) || 0));
  });

  // Geschwister rendern
  siblings.forEach(sibling => {
    const sq     = planned[sibling.sku] || 0;
    const sc     = committed[sibling.sku] || 0;
    const sdone  = commitDone[sibling.sku] || false;
    const soffen = Math.max(0, sq - sc);

    let chips = "";
    if (sq > 0) {
      chips += `<span class="badge info">Geplant: ${sq}</span>`;
      if (sdone) chips += `<span class="badge ok"><i class="ti ti-check" style="font-size:10px;"></i> Komm.</span>`;
      else if (sc > 0) chips += `<span class="badge warn">Offen: ${soffen}</span>`;
    }

    const card = document.createElement("div");
    card.className = "slave-card";
    card.dataset.sku = sibling.sku;
    const sLoaded = sibling._detailLoaded;
    card.innerHTML = `
      <div style="display:flex;gap:10px;align-items:flex-start;">
        ${imgTag(sibling, 48)}
        <div style="flex:1;min-width:0;">
          <div style="font-weight:500;font-size:13px;line-height:1.3;margin-bottom:2px;">${sibling.name}</div>
          <div class="muted">${sibling.sku}${sibling.ean ? " · " + sibling.ean : ""}</div>
          <div class="muted detail-price">${sLoaded ? `VK: ${fmtEur(sibling.price)} · Min: ${fmtEur(sibling.minPrice)}` : `<span style="opacity:.5;">Preis lädt…</span>`}</div>
          <div class="detail-stock">${sLoaded ? stockGrid(sibling.stocks, true) : `<div class="muted" style="font-size:11px;opacity:.5;padding:4px 0;">Lagerbestand wird geladen…</div>`}</div>
          ${chips ? `<div class="chip-row">${chips}</div>` : ""}
        </div>
        <div class="qty-control" style="flex-shrink:0;align-self:center;">
          <button class="qty-btn" data-sku="${sibling.sku}" data-dir="-1">−</button>
          <input class="qty-inp" type="number" min="0" value="${sq}" data-sku="${sibling.sku}" style="width:44px;" />
          <button class="qty-btn" data-sku="${sibling.sku}" data-dir="1">+</button>
        </div>
      </div>`;

    card.querySelectorAll(".qty-btn").forEach(b => b.addEventListener("click", () => {
      const s = b.dataset.sku, dir = parseInt(b.dataset.dir);
      const old = planned[s] || 0;
      const neu = Math.max(0, old + dir);
      if (neu === 0) delete planned[s]; else planned[s] = neu;
      saveState();
      const inp = card.querySelector(`.qty-inp[data-sku="${s}"]`);
      if (inp) inp.value = neu;
      const chipsEl = card.querySelector(".chip-row");
      if (chipsEl) chipsEl.innerHTML = neu > 0 ? `<span class="badge info">Geplant: ${neu}</span>` : "";
      sendPlanWebhook(s, old, neu, sibling);
    }));
    card.querySelector(".qty-inp").addEventListener("change", function() {
      const s = this.dataset.sku;
      const old = planned[s] || 0;
      const neu = Math.max(0, parseInt(this.value) || 0);
      if (neu === 0) delete planned[s]; else planned[s] = neu;
      saveState();
      sendPlanWebhook(s, old, neu, sibling);
    });

    slavesWrap.appendChild(card);
  });

  // Details für Hauptartikel + alle Geschwister nachladen
  const allSkusInView = [art.sku, ...siblings.map(s => s.sku)];
  ensureDetailsLoaded(allSkusInView, () => {
    // Hauptkarte aktualisieren
    if (art._detailLoaded) {
      const vkEl  = mainCard.querySelector(".detail-price-vk");
      const minEl = mainCard.querySelector(".detail-price-min");
      const stEl  = mainCard.querySelector(".detail-stock");
      if (vkEl)  vkEl.textContent  = fmtEur(art.price);
      if (minEl) minEl.textContent = fmtEur(art.minPrice);
      if (stEl)  stEl.innerHTML    = stockGrid(art.stocks, false);
    }
    // Geschwister-Karten aktualisieren
    siblings.forEach(sibling => {
      if (!sibling._detailLoaded) return;
      const sCard = slavesWrap.querySelector(`.slave-card[data-sku="${sibling.sku}"]`);
      if (!sCard) return;
      const priceEl = sCard.querySelector(".detail-price");
      const stockEl = sCard.querySelector(".detail-stock");
      if (priceEl) priceEl.innerHTML = `VK: ${fmtEur(sibling.price)} · Min: ${fmtEur(sibling.minPrice)}`;
      if (stockEl) stockEl.innerHTML = stockGrid(sibling.stocks, true);
    });
  });
}

// ── SUCHERGEBNISSE (paginiert, Master ausgeblendet) ───────────────────────
function runPrepSearch() {
  const resultsEl    = qs("#prep-results");
  const paginationEl = qs("#prep-pagination");
  if (!resultsEl) return;

  const hasFilter = prepSearch.trim() || prepLieferant.trim() || prepKategorie.trim() || prepNurLager;

  if (!hasFilter) {
    resultsEl.innerHTML = `<div class="muted" style="text-align:center;padding:24px 0;font-size:13px;">
      <i class="ti ti-filter" style="font-size:28px;display:block;margin-bottom:8px;opacity:.5;"></i>
      Suche oder Filter verwenden um Artikel zu finden.
    </div>`;
    if (paginationEl) paginationEl.innerHTML = "";
    return;
  }

  const sq = prepSearch.trim().toLowerCase();
  const sl = prepLieferant.trim().toLowerCase();
  const sk = prepKategorie.trim().toLowerCase();

  // Master-Artikel komplett ausblenden
  const filtered = articles.filter(a => {
    if (isMaster(a)) return false;
    if (prepNurLager && a.stock <= 0) return false;
    if (sl && !a.supplier.toLowerCase().includes(sl)) return false;
    if (sk && !a.category.toLowerCase().includes(sk)) return false;
    if (sq && !a.name.toLowerCase().includes(sq) && !a.sku.toLowerCase().includes(sq) && !a.ean.toLowerCase().includes(sq)) return false;
    return true;
  });

  const total      = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  prepPage = Math.min(prepPage, totalPages - 1);
  const pageItems  = filtered.slice(prepPage * PAGE_SIZE, (prepPage + 1) * PAGE_SIZE);

  resultsEl.innerHTML = "";

  if (total === 0) {
    resultsEl.innerHTML = `<div class="muted" style="text-align:center;padding:20px 0;">Keine Artikel gefunden.</div>`;
    if (paginationEl) paginationEl.innerHTML = "";
    return;
  }

  const info = document.createElement("div");
  info.className = "muted";
  info.style.cssText = "font-size:12px;margin-bottom:8px;";
  info.textContent = `${total} Treffer · Seite ${prepPage + 1} von ${totalPages}`;
  resultsEl.appendChild(info);

  pageItems.forEach(art => {
    const sku   = art.sku;
    const qty   = planned[sku] || 0;
    const comm  = committed[sku] || 0;
    const done  = commitDone[sku] || false;
    const offen = Math.max(0, qty - comm);
    const master = getMasterOf(art);
    const loaded = art._detailLoaded;

    let chips = "";
    if (qty > 0) {
      chips += `<span class="badge info">Geplant: ${qty}</span>`;
      if (done) chips += `<span class="badge ok"><i class="ti ti-check" style="font-size:10px;"></i> Komm.</span>`;
      else if (comm > 0) chips += `<span class="badge warn">Offen: ${offen}</span>`;
    }

    const card = document.createElement("div");
    card.className = "card";
    card.dataset.sku = sku;
    card.style.cursor = "pointer";
    if (qty > 0) card.style.borderColor = done ? "var(--ok)" : "var(--info)";

    card.innerHTML = `
      <div style="display:flex;gap:10px;align-items:flex-start;">
        ${imgTag(art, 52)}
        <div style="flex:1;min-width:0;">
          <div style="font-weight:500;font-size:13px;line-height:1.3;margin-bottom:2px;">${art.name}</div>
          <div class="muted">${art.sku}${art.ean ? " · " + art.ean : ""} · ${art.category}</div>
          <div class="muted detail-price">${loaded ? "VK: " + fmtEur(art.price) : `<span style="opacity:.5;">VK: lädt…</span>`}${master ? ` · <span style="color:var(--info);">Variante</span>` : ""}</div>
          <div class="detail-stock">${loaded ? stockGrid(art.stocks, true) : `<div class="muted" style="font-size:11px;opacity:.5;padding:4px 0;">Lagerbestand wird geladen…</div>`}</div>
          ${chips ? `<div class="chip-row">${chips}</div>` : ""}
        </div>
        <div class="qty-control" style="flex-shrink:0;align-self:center;" onclick="event.stopPropagation()">
          <button class="qty-btn" data-sku="${sku}" data-dir="-1">−</button>
          <input class="qty-inp" type="number" min="0" value="${qty}" data-sku="${sku}" style="width:44px;" onclick="event.stopPropagation()" />
          <button class="qty-btn" data-sku="${sku}" data-dir="1">+</button>
        </div>
      </div>`;

    // Klick auf Karte → Detailansicht (direkt die geklickte SKU)
    card.addEventListener("click", () => {
      prepDetailSku = art.sku;
      renderPrep();
    });

    // Qty-Events (ohne komplettes Re-Render)
    card.querySelectorAll(".qty-btn").forEach(b => b.addEventListener("click", () => {
      const s = b.dataset.sku, dir = parseInt(b.dataset.dir);
      const old = planned[s] || 0;
      const neu = Math.max(0, old + dir);
      if (neu === 0) delete planned[s]; else planned[s] = neu;
      saveState();
      const inp = card.querySelector(`.qty-inp[data-sku="${s}"]`);
      if (inp) inp.value = neu;
      card.style.borderColor = neu > 0 ? "var(--info)" : "";
      sendPlanWebhook(s, old, neu, articles.find(a => a.sku === s));
    }));
    card.querySelector(".qty-inp").addEventListener("change", function() {
      const s = this.dataset.sku;
      const old = planned[s] || 0;
      const neu = Math.max(0, parseInt(this.value) || 0);
      if (neu === 0) delete planned[s]; else planned[s] = neu;
      saveState();
      card.style.borderColor = neu > 0 ? "var(--info)" : "";
      sendPlanWebhook(s, old, neu, articles.find(a => a.sku === s));
    });

    resultsEl.appendChild(card);
  });

  // Pagination
  if (paginationEl) {
    paginationEl.innerHTML = "";
    if (totalPages <= 1) return;
    const pg = document.createElement("div");
    pg.className = "pagination";

    const prevBtn = document.createElement("button");
    prevBtn.className = "btn btn-sm";
    prevBtn.innerHTML = `<i class="ti ti-chevron-left"></i> Zurück`;
    prevBtn.disabled = prepPage === 0;
    prevBtn.onclick = () => { prepPage--; runPrepSearch(); resultsEl.scrollIntoView({ behavior: "smooth" }); };

    const pageInfo = document.createElement("span");
    pageInfo.className = "muted";
    pageInfo.style.fontSize = "12px";
    pageInfo.textContent = `${prepPage + 1} / ${totalPages}`;

    const nextBtn = document.createElement("button");
    nextBtn.className = "btn btn-sm";
    nextBtn.innerHTML = `Weiter <i class="ti ti-chevron-right"></i>`;
    nextBtn.disabled = prepPage >= totalPages - 1;
    nextBtn.onclick = () => { prepPage++; runPrepSearch(); resultsEl.scrollIntoView({ behavior: "smooth" }); };

    pg.appendChild(prevBtn);
    pg.appendChild(pageInfo);
    pg.appendChild(nextBtn);
    paginationEl.appendChild(pg);
  }

  // Detaildaten (Preis, Lager, Bild) für die sichtbaren Treffer nachladen
  const visibleSkus = pageItems.map(a => a.sku);
  ensureDetailsLoaded(visibleSkus, () => {
    // Nur die betroffenen Karten aktualisieren, kein komplettes Re-Render
    pageItems.forEach(art => {
      if (!art._detailLoaded) return;
      const card = resultsEl.querySelector(`.card[data-sku="${art.sku}"]`);
      if (!card) return;
      const priceEl = card.querySelector(".detail-price");
      const stockEl = card.querySelector(".detail-stock");
      const master  = getMasterOf(art);
      if (priceEl) priceEl.innerHTML = `VK: ${fmtEur(art.price)}${master ? ` · <span style="color:var(--info);">Variante</span>` : ""}`;
      if (stockEl) stockEl.innerHTML = stockGrid(art.stocks, true);
    });
  });
}

// ── KOMMISSIONIERUNG ──────────────────────────────────────────────────────
function renderWarehouse() {
  const wrap = qs("#view-warehouse");
  wrap.innerHTML = `<p class="muted" style="margin-bottom:12px;">Artikel entnehmen & bestätigen. Artikel können auch wieder aus der Liste entfernt werden.</p>`;

  const toCommit = articles.filter(a => (planned[a.sku] || 0) > 0 && !commitDone[a.sku]);

  if (toCommit.length === 0) {
    wrap.innerHTML += `<div style="text-align:center;padding:32px 0;" class="muted">
      <i class="ti ti-clipboard-list" style="font-size:40px;display:block;margin-bottom:12px;"></i>
      Noch keine Artikel in der Vorbereitung ausgewählt.
    </div>`;
    return;
  }

  const totalPlanned   = toCommit.reduce((s, a) => s + (planned[a.sku] || 0), 0);
  const totalCommitted = toCommit.reduce((s, a) => s + (committed[a.sku] || 0), 0);
  const totalOpen      = Math.max(0, totalPlanned - totalCommitted);
  wrap.innerHTML += `
    <div class="card" style="background:var(--bg2);margin-bottom:16px;">
      <div style="display:flex;gap:16px;justify-content:space-around;text-align:center;">
        <div><div style="font-size:20px;font-weight:600;">${totalPlanned}</div><div class="muted">Geplant</div></div>
        <div><div style="font-size:20px;font-weight:600;color:var(--ok);">${totalCommitted}</div><div class="muted">Kommissioniert</div></div>
        <div><div style="font-size:20px;font-weight:600;color:${totalOpen>0?"var(--warn)":"var(--ok)"};">${totalOpen}</div><div class="muted">Offen</div></div>
      </div>
    </div>`;

  toCommit.forEach(art => {
    const sku   = art.sku;
    const qty   = planned[sku] || 0;
    const comm  = committed[sku] || 0;
    const done  = commitDone[sku] || false;
    const offen = Math.max(0, qty - comm);
    const log   = commitLog[sku] || [];
    const maxEntnahme = Math.min(offen, art.stock);
    const master = getMasterOf(art);

    const card = document.createElement("div");
    card.className = "card";
    card.style.borderColor = done ? "var(--ok)" : "var(--border)";

    const logHTML = log.length ? `
      <div style="margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border);">
        <div class="muted" style="font-size:11px;margin-bottom:4px;">Buchungshistorie:</div>
        ${log.map(e => `<div style="font-size:12px;color:var(--text2);">
          <i class="ti ti-box" style="font-size:10px;"></i>
          ${e.qty}× – ${e.ref ? `<em>${e.ref}</em>` : "kein Kommentar"} – ${new Date(e.ts).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}
        </div>`).join("")}
      </div>` : "";

    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;">
        <div style="flex:1;min-width:160px;">
          <div style="font-weight:500;font-size:13px;">${art.name}</div>
          <div class="muted">${art.sku}${art.ean ? " · " + art.ean : ""}${master ? ` · <span style="color:var(--info);">${master.name}</span>` : ""}</div>
          <div class="chip-row">
            <span class="badge info">Geplant: ${qty}</span>
            <span class="badge ok">Komm.: ${comm}</span>
            ${offen > 0 ? `<span class="badge warn">Offen: ${offen}</span>` : `<span class="badge ok"><i class="ti ti-check" style="font-size:10px;"></i> Erledigt</span>`}
            ${art.stock < offen ? `<span class="badge err">Lager: ${art.stock}</span>` : ""}
          </div>
          ${logHTML}
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0;">
          ${!done ? `
            <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
              <input class="qty-inp inp-wh-qty" type="number" min="1" max="${Math.max(1,art.stock)}"
                value="${maxEntnahme > 0 ? maxEntnahme : 1}" data-sku="${sku}" style="width:60px;" />
              <input class="btn" type="text" placeholder="Box / Kommentar"
                id="ref-${sku}" style="width:120px;font-size:12px;padding:6px 8px;"
                value="${localStorage.getItem('lastRef') || ''}" />
            </div>
            <button class="btn btn-ok btn-commit" data-sku="${sku}" style="width:100%;">
              <i class="ti ti-check"></i> Bestätigen
            </button>` : `
            <button class="btn-sm btn-undo" data-sku="${sku}">
              <i class="ti ti-arrow-back-up"></i> Korrigieren
            </button>`}
          <button class="btn-sm btn-danger btn-remove-from-prep" data-sku="${sku}" title="Aus Kommissionsliste entfernen">
            <i class="ti ti-trash"></i> Entfernen
          </button>
        </div>
      </div>`;

    wrap.appendChild(card);
  });

  wrap.querySelectorAll(".btn-commit").forEach(b => b.addEventListener("click", async () => {
    const sku  = b.dataset.sku;
    const art  = articles.find(a => a.sku === sku);
    const inp  = b.closest(".card").querySelector(".inp-wh-qty");
    const refInp = qs(`#ref-${sku}`);
    const entnahme = Math.max(1, parseInt(inp?.value) || 1);
    const ref  = refInp?.value.trim() || "";
    if (ref) localStorage.setItem("lastRef", ref);
    committed[sku] = (committed[sku] || 0) + entnahme;
    if (!commitLog[sku]) commitLog[sku] = [];
    commitLog[sku].push({ qty: entnahme, ref, ts: new Date().toLocaleString("de-DE"), user: currentUser });
    if (committed[sku] >= (planned[sku] || 0)) commitDone[sku] = true;
    saveState();
    showNotification(`${entnahme}× ${art.name} kommissioniert${ref ? " → " + ref : ""}`);
    await sendWebhook("COMMIT", { sku, art, qty: entnahme, ref });
    renderWarehouse();
  }));

  wrap.querySelectorAll(".btn-undo").forEach(b => b.addEventListener("click", async () => {
    const sku = b.dataset.sku;
    const art = articles.find(a => a.sku === sku);
    const lastEntry = (commitLog[sku] || []).at(-1);
    const info = lastEntry ? `${lastEntry.qty}× (${lastEntry.ref || "kein Kommentar"})` : `${committed[sku] || 0}×`;
    if (!confirm(`Letzte Buchung von "${art.name}" rückgängig machen?\n${info}`)) return;
    const undoQty = lastEntry ? lastEntry.qty : (committed[sku] || 0);
    commitLog[sku] = (commitLog[sku] || []).slice(0, -1);
    committed[sku] = Math.max(0, (committed[sku] || 0) - undoQty);
    if (committed[sku] === 0) delete committed[sku];
    delete commitDone[sku];
    saveState();
    showNotification(`${art.name} – letzte Buchung rückgängig gemacht`, "warn");
    await sendWebhook("COMMIT_UNDO", { sku, art, undoQty });
    renderWarehouse();
  }));

  wrap.querySelectorAll(".btn-remove-from-prep").forEach(b => b.addEventListener("click", async () => {
    const sku = b.dataset.sku;
    const art = articles.find(a => a.sku === sku);
    const hasCommitted = (committed[sku] || 0) > 0;
    const confirmMsg = hasCommitted
      ? `"${art.name}" aus der Kommissionsliste entfernen?\n\nHINWEIS: Es wurden bereits ${committed[sku]} Stück kommissioniert. Diese Buchungen bleiben im Log erhalten.`
      : `"${art.name}" aus der Kommissionsliste entfernen?`;
    if (!confirm(confirmMsg)) return;
    delete planned[sku];
    delete commitDone[sku];
    saveState();
    showNotification(`${art.name} aus Kommissionsliste entfernt`, "warn");
    await sendWebhook("REMOVE", { sku, art, currentPlanned: planned[sku] || 0 });
    renderWarehouse();
  }));
}

// ── VERKAUF ───────────────────────────────────────────────────────────────
function renderSales() {
  const wrap = qs("#view-sales");
  wrap.innerHTML = `<p class="muted" style="margin-bottom:12px;">Verkaufslisten für Messe-Kunden.</p>`;

  const newBtn = document.createElement("button");
  newBtn.className = "btn btn-info";
  newBtn.style.marginBottom = "12px";
  newBtn.innerHTML = `<i class="ti ti-plus"></i> Neue Kundenliste`;
  newBtn.onclick = () => {
    const name = prompt("Kundenname / Listenbezeichnung:");
    if (!name) return;
    const list = { id: Date.now().toString(), name, items: [], sold: {} };
    salesLists.push(list);
    activeSales = list.id;
    saveState(); renderSales();
  };
  wrap.appendChild(newBtn);

  if (salesLists.length === 0) {
    wrap.innerHTML += `<div class="muted" style="text-align:center;padding:24px 0;">Noch keine Verkaufslisten angelegt.</div>`;
    return;
  }

  const tabRow = document.createElement("div");
  tabRow.style.cssText = "display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;";
  salesLists.forEach(l => {
    const b = document.createElement("button");
    b.className = "btn" + (l.id === activeSales ? " btn-info" : "");
    b.textContent = l.name;
    b.style.fontSize = "12px";
    b.onclick = () => { activeSales = l.id; saveState(); renderSales(); };
    tabRow.appendChild(b);
  });
  wrap.appendChild(tabRow);

  const list = salesLists.find(l => l.id === activeSales);
  if (!list) return;

  const messeArtikel = articles.filter(a => (committed[a.sku] || 0) > 0);
  if (messeArtikel.length > 0) {
    const addRow = document.createElement("div");
    addRow.style.marginBottom = "10px";
    const sel = document.createElement("select");
    sel.style.cssText = "width:100%;padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:14px;margin-bottom:6px;";
    sel.innerHTML = `<option value="">— Artikel auswählen —</option>` +
      messeArtikel.map(a => {
        const verfuegbar = (committed[a.sku] || 0) - (list.sold?.[a.sku] || 0) - salesLists.filter(l => l.id !== list.id).reduce((s, l2) => s + (l2.sold?.[a.sku] || 0), 0);
        return `<option value="${a.sku}">${a.name} (${a.sku}) – verf.: ${Math.max(0, verfuegbar)}</option>`;
      }).join("");

    const addBtn = document.createElement("button");
    addBtn.className = "btn btn-info";
    addBtn.innerHTML = `<i class="ti ti-plus"></i> Hinzufügen`;
    addBtn.onclick = () => {
      const sku = sel.value;
      if (!sku) return;
      const art = articles.find(a => a.sku === sku);
      if (!art) return;
      if (list.items.find(i => i.sku === sku)) {
        showNotification("Bereits in dieser Liste vorhanden", "warn"); return;
      }
      list.items.push({ sku, name: art.name, price: art.price, minPrice: art.minPrice, qty: 1 });
      saveState(); renderSales();
    };
    addRow.appendChild(sel);
    addRow.appendChild(addBtn);
    wrap.appendChild(addRow);
  }

  if (list.items.length === 0) {
    wrap.innerHTML += `<div class="muted" style="padding:16px 0;">Noch keine Artikel in dieser Liste.</div>`;
  } else {
    list.items.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";
      const art = articles.find(a => a.sku === item.sku);
      card.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
          <div style="flex:1;min-width:0;">
            <div style="font-weight:500;font-size:13px;">${item.name}</div>
            <div class="muted">${item.sku} · VK: ${fmtEur(item.price)}${art ? ` · Min: ${fmtEur(art.minPrice)}` : ""}</div>
          </div>
          <div class="qty-control" style="flex-shrink:0;">
            <button class="qty-btn" data-sku="${item.sku}" data-dir="-1">−</button>
            <input class="qty-inp" type="number" min="1" value="${item.qty}" data-sku="${item.sku}" style="width:52px;" />
            <button class="qty-btn" data-sku="${item.sku}" data-dir="1">+</button>
            <button class="btn-sm btn-danger" data-sku="${item.sku}" data-action="remove">
              <i class="ti ti-trash"></i>
            </button>
          </div>
        </div>`;
      wrap.appendChild(card);
    });

    wrap.querySelectorAll(".qty-btn").forEach(b => b.addEventListener("click", () => {
      const sku = b.dataset.sku, dir = parseInt(b.dataset.dir);
      const item = list.items.find(i => i.sku === sku);
      if (item) { item.qty = Math.max(1, (item.qty || 1) + dir); saveState(); renderSales(); }
    }));
    wrap.querySelectorAll(".qty-inp").forEach(inp => inp.addEventListener("change", () => {
      const item = list.items.find(i => i.sku === inp.dataset.sku);
      if (item) { item.qty = Math.max(1, parseInt(inp.value) || 1); saveState(); }
    }));
    wrap.querySelectorAll("[data-action=remove]").forEach(b => b.addEventListener("click", () => {
      list.items = list.items.filter(i => i.sku !== b.dataset.sku);
      saveState(); renderSales();
    }));

    const total = list.items.reduce((s, i) => s + i.qty * i.price, 0);
    const totDiv = document.createElement("div");
    totDiv.style.cssText = "border-top:0.5px solid var(--border);padding-top:12px;display:flex;justify-content:space-between;align-items:center;margin-top:4px;";
    totDiv.innerHTML = `<span style="font-weight:500;">Gesamt</span><span style="font-weight:600;font-size:20px;">${fmtEur(total)}</span>`;
    wrap.appendChild(totDiv);

    const sellBtn = document.createElement("button");
    sellBtn.className = "btn btn-ok";
    sellBtn.style.cssText = "margin-top:10px;width:100%;justify-content:center;";
    sellBtn.innerHTML = `<i class="ti ti-shopping-cart-check"></i> Verkauf abschließen`;
    sellBtn.onclick = async () => {
      if (!confirm("Verkauf abschließen?")) return;
      list.items.forEach(i => {
        if (!list.sold) list.sold = {};
        list.sold[i.sku] = (list.sold[i.sku] || 0) + i.qty;
        committed[i.sku] = Math.max(0, (committed[i.sku] || 0) - i.qty);
      });
      await sendWebhook("SALE", {
        listName: list.name,
        items: list.items.map(i => {
          const a = articles.find(a => a.sku === i.sku);
          return { sku: i.sku, ean: a?.ean || "", name: i.name, qty: i.qty, price: i.price };
        }),
        total
      });
      list.items = [];
      saveState(); renderSales();
      showNotification(`Verkauf "${list.name}" abgeschlossen`);
    };
    wrap.appendChild(sellBtn);
  }

  const delBtn = document.createElement("button");
  delBtn.className = "btn btn-danger";
  delBtn.style.cssText = "margin-top:10px;font-size:12px;";
  delBtn.innerHTML = `<i class="ti ti-trash"></i> Liste "${list.name}" löschen`;
  delBtn.onclick = () => {
    if (!confirm(`Liste "${list.name}" löschen?`)) return;
    salesLists = salesLists.filter(l => l.id !== list.id);
    activeSales = salesLists[0]?.id || null;
    saveState(); renderSales();
  };
  wrap.appendChild(delBtn);
}

// ── WEBHOOK ───────────────────────────────────────────────────────────────
// Reicht eine Änderung in die Sync-Queue ein (statt sofort zu senden)
function sendWebhook(action, data) {
  if (!WEBHOOK_URL) return;
  const art = data.art || null;
  const sku = data.sku || art?.sku || "";
  const payload = {
    sku,
    ean:     data.ean  || art?.ean  || "",
    artName: data.artName || art?.name || "",
    ref:     data.ref  || "",
  };

  switch (action) {
    case "PLAN_SET":     payload.qty = data.qty || 0; break;
    case "PLAN":         payload.qty = data.qty || 0; break;
    case "PLAN_ADJUST":  payload.diff = data.diff || 0; break;
    case "COMMIT":       payload.qty = data.qty || 0; break;
    case "COMMIT_UNDO":  payload.undoQty = data.undoQty || 0; break;
    case "REMOVE":       payload.currentPlanned = data.currentPlanned || 0; break;
    case "SALE":
      payload.items    = data.items    || [];
      payload.listName = data.listName || "";
      break;
  }

  // Mengenänderungen am selben Artikel werden gebündelt (debounced),
  // alles andere (COMMIT, SALE etc.) geht sofort in die Queue
  const debounceKey = (action === "PLAN_SET" || action === "REMOVE")
    ? "plan:" + sku
    : null;

  queueChange(action, payload, debounceKey);
}

// Planung senden: immer absolute Menge als PLAN (einfacher und zuverlässiger als ADJUST)
function sendPlanWebhook(sku, oldQty, newQty, art) {
  if (!WEBHOOK_URL) return;
  if (newQty === 0) {
    sendWebhook("REMOVE", { sku, art });
  } else {
    // PLAN_SET: immer absolute Zielmenge, kein Summieren im Script
    sendWebhook("PLAN_SET", { sku, qty: newQty, art });
  }
}

function fmtEur(v) {
  return (v || 0).toLocaleString("de-DE", { style: "currency", currency: "EUR" });
}

function fmtStocks(s) {
  if (!s) return "Lager: –";
  const parts = [];
  if (s.zl > 0) parts.push(`ZL: ${s.zl}`);
  if (s.co > 0) parts.push(`CO: ${s.co}`);
  if (s.st > 0) parts.push(`ST: ${s.st}`);
  if (s.fb > 0) parts.push(`FB: ${s.fb}`);
  if (s.hh > 0) parts.push(`HH: ${s.hh}`);
  return parts.length ? parts.join(" · ") : "Kein Bestand";
}

// Lager-Grid mit 5 Kacheln, Bestand 0 ausgegraut
function stockGrid(stocks, small = false) {
  if (!stocks) return "";
  const lager = [
    { key: "zl", label: "ZL", val: stocks.zl },
    { key: "co", label: "CO", val: stocks.co },
    { key: "st", label: "ST", val: stocks.st },
    { key: "fb", label: "FB", val: stocks.fb },
    { key: "hh", label: "HH", val: stocks.hh },
  ];
  const pad    = small ? "4px 2px" : "6px 4px";
  const numSz  = small ? "13px" : "15px";
  const labSz  = small ? "9px"  : "10px";
  const radius = small ? "4px"  : "6px";
  return `<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:${small?3:4}px;margin:${small?"6px":"8px"} 0;">
    ${lager.map(l => {
      const active = l.val > 0;
      const bg     = active ? "var(--info-bg)"  : "var(--bg2)";
      const col    = active ? "var(--info)"     : "var(--text2)";
      const numCol = active ? "var(--info)"     : "var(--text2)";
      return `<div style="background:${bg};border-radius:${radius};padding:${pad};text-align:center;">
        <div style="font-size:${labSz};color:${col};margin-bottom:1px;">${l.label}</div>
        <div style="font-size:${numSz};font-weight:500;color:${numCol};">${l.val}</div>
      </div>`;
    }).join("")}
  </div>`;
}

// Produktbild aus IMAGE_MINI mit Fallback-Icon – immer ein einzelnes Element
function imgTag(art, size = 56) {
  const placeholder = `<div style="width:${size}px;height:${size}px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="ti ti-photo-off" style="font-size:${Math.round(size*0.4)}px;color:var(--text2);" aria-hidden="true"></i></div>`;
  if (!art.image) return placeholder;
  return `<div style="width:${size}px;height:${size}px;flex-shrink:0;">
    <img src="${art.image}" loading="lazy"
      style="width:${size}px;height:${size}px;object-fit:contain;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg2);"
      onerror="this.parentElement.innerHTML='<div style=\\'width:${size}px;height:${size}px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;\\'><i class=\\'ti ti-photo-off\\' style=\\'font-size:${Math.round(size*0.4)}px;color:var(--text2);\\'></i></div>'"
      alt="" />
  </div>`;
}

});

qs("#btn-settings").addEventListener("click", () => {
  const panel = qs("#settings-panel");
  const open  = panel.style.display === "none";
  panel.style.display = open ? "block" : "none";
  if (open) qs("#inp-webhook").value = WEBHOOK_URL;
});

qs("#btn-save-settings").addEventListener("click", () => {
  WEBHOOK_URL = qs("#inp-webhook").value.trim();
  saveUIState();
  qs("#settings-panel").style.display = "none";
  showNotification("Einstellungen gespeichert");
  if (articles.length === 0) startApp();
  else if (WEBHOOK_URL && !messeLabel) showMesseDialog();
  else if (WEBHOOK_URL) { ensureUser(); loadRemoteState(); startAutoRefresh(); }
});

qs("#btn-test-webhook").addEventListener("click", async () => {
  const url    = qs("#inp-webhook").value.trim();
  const status = qs("#webhook-status");
  if (!url) { status.textContent = "Bitte zuerst eine URL eingeben."; status.style.color = "var(--err)"; return; }
  status.textContent = "Teste…"; status.style.color = "var(--text2)";
  try {
    const resp = await fetch(url + "?action=ping");
    const json = await resp.json();
    status.textContent = json.ok ? "✓ " + (json.msg || "Verbunden") : "✗ " + json.error;
    status.style.color = json.ok ? "var(--ok)" : "var(--err)";
  } catch(e) {
    status.textContent = "✗ " + e.message;
    status.style.color = "var(--err)";
  }
});

// ── START ─────────────────────────────────────────────────────────────────
async function startApp(forceReload = false) {
  showLoading();
  setLoadingStep("Einstellungen laden…", 5);
  await sleep(100);

  const ok = await loadArticles(forceReload);
  if (!ok) return;

  if (WEBHOOK_URL && messeLabel) {
    setLoadingStep("Lade Kommissionierungsstand…", 88);
    await loadRemoteState(true);
  }

  setLoadingStep("Fast fertig…", 95);
  await sleep(100);
  hideLoading();

  ensureUser();
  renderView();
  startSyncLoop();
  updateSyncStatusUI();

  if (WEBHOOK_URL && !messeLabel) {
    // Noch keine Messe ausgewählt → Dialog anzeigen
    await showMesseDialog();
  } else if (WEBHOOK_URL && messeLabel) {
    startAutoRefresh();
  }

  window.addEventListener("beforeunload", () => {
    if (syncQueue.length > 0) syncNow();
  });
}

loadUIState();
loadSyncQueue();
clearArticleCache(); // alten Cache aufräumen
qs("#messe-label-display").textContent = messeLabel || "Messe auswählen…";
document.querySelector(`.role-btn[data-role="${role}"]`)?.classList.add("btn-info");

if (WEBHOOK_URL) {
  startApp();
} else {
  hideLoading();
  renderView();
}
</script>
</body>
</html>
