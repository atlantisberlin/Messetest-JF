<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messe-Tool</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeece8;
      --text: #1a1a18; --text2: #6b6b67; --text3: #9a9a96;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --info-bg: #e6f1fb; --info: #185fa5;
      --success-bg: #eaf3de; --success: #3b6d11;
      --warn-bg: #faeeda; --warn: #854f0b;
      --danger-bg: #fcebeb; --danger: #a32d2d;
      --radius: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #333331;
        --text: #f0ede8; --text2: #a0a09c; --text3: #6a6a66;
        --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
        --info-bg: #0c447c; --info: #85b7eb;
        --success-bg: #27500a; --success: #97c459;
        --warn-bg: #633806; --warn: #ef9f27;
        --danger-bg: #791f1f; --danger: #f09595;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; color: var(--text); background: var(--bg3); min-height: 100vh; }
    #root { max-width: 480px; margin: 0 auto; background: var(--bg); min-height: 100vh; }
    input[type=number], input[type=text] {
      width: 100%; padding: 8px 10px; border: 0.5px solid var(--border2);
      border-radius: var(--radius); background: var(--bg); color: var(--text);
      font-size: 14px; outline: none;
    }
    input:focus { box-shadow: 0 0 0 2px var(--info); }
    button { font-family: inherit; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ─── CONFIG ────────────────────────────────────────────────────────────────
// Sheet-ID kann per URL-Parameter überschrieben werden: ?sheet=IHRE_ID
// Tabelle muss öffentlich freigegeben sein: "Jeder mit dem Link kann ansehen"
const DEFAULT_SHEET_ID = "11Pzm0vNCKUC883rhTftRAD1SzW8CdXo30tZPSu0iYEw";

function getSheetId() {
  const p = new URLSearchParams(window.location.search).get("sheet");
  return p ? p.trim() : DEFAULT_SHEET_ID;
}

// ─── HELPERS ───────────────────────────────────────────────────────────────
const fmtEur = v => Number(v).toLocaleString("de-DE", { style: "currency", currency: "EUR" });
const parseNum = v => parseFloat(String(v || "0").replace(",", ".")) || 0;

function parseCSVLine(line) {
  const cols = []; let cur = "", inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
    else { cur += ch; }
  }
  cols.push(cur.trim());
  return cols;
}

function csvToArticles(csv) {
  const lines = csv.trim().split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]).map(h => h.replace(/^"|"$/g, "").toUpperCase().trim());
  const idx = k => headers.indexOf(k);
  return lines.slice(1).map((line, i) => {
    const c = parseCSVLine(line).map(v => v.replace(/^"|"$/g, "").trim());
    if (!c[idx("SKU")]) return null;
    return {
      id: i + 1, sku: c[idx("SKU")] || "", ean: c[idx("EAN")] || "",
      name: c[idx("NAME")] || "", category: c[idx("KATEGORIE")] || "",
      costPrice: parseNum(c[idx("EKNETTO")]), uvp: parseNum(c[idx("UVPBRUTTO")]),
      price: parseNum(c[idx("VKBRUTTO")]), minPrice: parseNum(c[idx("MINDESTVK")]),
      supplier: c[idx("LIEFERANT")] || "", stock: parseNum(c[idx("QUANTITY")]),
      image: c[idx("IMAGE")] || "", atlosId: c[idx("ATLOSID")] || "",
    };
  }).filter(Boolean);
}

async function fetchSheetCSV(sheetId) {
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&cachebust=${Date.now()}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status} – Tabelle nicht erreichbar. Freigabe prüfen.`);
  return r.text();
}

// ─── APP ───────────────────────────────────────────────────────────────────
const { useState, useEffect } = React;
const ROLES = { standard: "Verkäufer", supervisor: "Supervisor" };

function App() {
  const [view, setView] = useState("prep");
  const [role, setRole] = useState("standard");
  const [articles, setArticles] = useState([]);
  const [loadState, setLoadState] = useState("idle"); // idle | loading | done | error
  const [loadError, setLoadError] = useState(null);
  const [sheetId] = useState(getSheetId);
  const [planned, setPlanned] = useState({});
  const [committed, setCommitted] = useState({});
  const [commitDone, setCommitDone] = useState({});
  const [salesLists, setSalesLists] = useState([]);
  const [activeSalesList, setActiveSalesList] = useState(null);
  const [showNewList, setShowNewList] = useState(false);
  const [newListName, setNewListName] = useState("");
  const [notification, setNotification] = useState(null);

  const notify = (msg, type = "success") => {
    setNotification({ msg, type });
    setTimeout(() => setNotification(null), 2800);
  };

  const loadArticles = async () => {
    setLoadState("loading"); setLoadError(null);
    try {
      const csv = await fetchSheetCSV(sheetId);
      const arts = csvToArticles(csv);
      if (arts.length === 0) throw new Error("Keine Artikel gefunden. Spaltenbezeichnungen prüfen.");
      setArticles(arts);
      setLoadState("done");
      notify(`${arts.length} Artikel geladen`);
    } catch (e) {
      setLoadState("error");
      setLoadError(e.message);
    }
  };

  useEffect(() => { loadArticles(); }, []);

  const messeStock = Object.entries(committed).reduce((acc, [id, qty]) => {
    acc[Number(id)] = qty - salesLists.reduce((s, l) => s + (l.sold?.[Number(id)] || 0), 0);
    return acc;
  }, {});

  const setPlan = (id, val) => setPlanned(p => ({ ...p, [id]: Math.max(0, parseInt(val) || 0) }));

  const commitItem = (art) => {
    const qty = planned[art.id] || 0;
    if (qty === 0) return;
    setCommitDone(c => ({ ...c, [art.id]: true }));
    setCommitted(c => ({ ...c, [art.id]: (c[art.id] || 0) + qty }));
    notify(`${qty}× ${art.name} kommissioniert`);
  };

  const createList = () => {
    if (!newListName.trim()) return;
    const l = { id: Date.now(), name: newListName.trim(), items: [], sold: {} };
    setSalesLists(ls => [...ls, l]);
    setActiveSalesList(l.id);
    setNewListName(""); setShowNewList(false);
  };

  const activeList = salesLists.find(l => l.id === activeSalesList);

  const addToList = (art) => {
    if (!activeList) return;
    setSalesLists(ls => ls.map(l => {
      if (l.id !== activeSalesList || l.items.find(i => i.id === art.id)) return l;
      return { ...l, items: [...l.items, { id: art.id, qty: 1, price: art.price }] };
    }));
  };

  const updateListItem = (artId, field, val) => {
    setSalesLists(ls => ls.map(l => {
      if (l.id !== activeSalesList) return l;
      return {
        ...l, items: l.items.map(i => {
          if (i.id !== artId) return i;
          const art = articles.find(a => a.id === artId);
          if (field === "price") {
            const p = parseFloat(val) || 0;
            if (p < art.minPrice && role !== "supervisor") {
              notify(`Mindestpreis: ${fmtEur(art.minPrice)}`, "warn");
              return { ...i, price: art.minPrice };
            }
            return { ...i, price: p };
          }
          return { ...i, qty: Math.max(1, parseInt(val) || 1) };
        })
      };
    }));
  };

  const removeFromList = artId => setSalesLists(ls => ls.map(l =>
    l.id !== activeSalesList ? l : { ...l, items: l.items.filter(i => i.id !== artId) }
  ));

  const listTotal = activeList ? activeList.items.reduce((s, i) => s + i.qty * i.price, 0) : 0;

  const tabs = [
    { id: "prep", label: "Vorbereitung", icon: "ti-clipboard-list" },
    { id: "warehouse", label: "Kommission", icon: "ti-packages" },
    { id: "sales", label: "Verkauf", icon: "ti-shopping-cart" },
  ];

  const s = {
    card: { background: "var(--bg)", border: "0.5px solid var(--border)", borderRadius: "var(--radius-lg)", padding: "10px 12px", marginBottom: 8 },
    badge: (ok) => ({ fontSize: 11, padding: "2px 8px", borderRadius: 12,
      background: ok ? "var(--success-bg)" : "var(--warn-bg)", color: ok ? "var(--success)" : "var(--warn)" }),
    pill: (active) => ({ fontSize: 12, padding: "4px 10px", borderRadius: 20, cursor: "pointer",
      border: `0.5px solid ${active ? "var(--info)" : "var(--border)"}`,
      background: active ? "var(--info-bg)" : "none", color: active ? "var(--info)" : "var(--text)" }),
    btn: { fontSize: 13, padding: "6px 12px", borderRadius: "var(--radius)", border: "0.5px solid var(--border2)", background: "none", cursor: "pointer", color: "var(--text)" },
    muted: { fontSize: 11, color: "var(--text2)" },
  };

  return (
    <div style={{ paddingBottom: 32 }}>
      {/* Header */}
      <div style={{ padding: "14px 16px 0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <i className="ti ti-scuba-diving" style={{ fontSize: 22, color: "var(--info)" }} aria-hidden />
          <span style={{ fontWeight: 500, fontSize: 16 }}>Messe-Tool</span>
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {loadState === "loading" && <i className="ti ti-loader-2" style={{ fontSize: 16, color: "var(--text2)" }} aria-hidden />}
          {loadState === "done" && (
            <button onClick={loadArticles} title="Artikel neu laden"
              style={{ ...s.btn, padding: "3px 8px", fontSize: 12, display: "flex", alignItems: "center", gap: 4 }}>
              <i className="ti ti-refresh" aria-hidden /> {articles.length}
            </button>
          )}
          {Object.entries(ROLES).map(([k, v]) => (
            <button key={k} onClick={() => setRole(k)} style={{ ...s.pill(role === k), fontSize: 12 }}>{v}</button>
          ))}
        </div>
      </div>

      {/* Load error */}
      {loadState === "error" && (
        <div style={{ margin: "10px 16px", padding: "10px 12px", borderRadius: "var(--radius)",
          background: "var(--danger-bg)", color: "var(--danger)", fontSize: 13 }}>
          <i className="ti ti-alert-circle" aria-hidden /> {loadError}
          <button onClick={loadArticles} style={{ marginLeft: 12, ...s.btn, fontSize: 12, padding: "2px 8px" }}>
            Wiederholen
          </button>
        </div>
      )}

      {/* Loading skeleton */}
      {loadState === "loading" && (
        <div style={{ padding: "24px 16px", textAlign: "center", color: "var(--text2)", fontSize: 13 }}>
          <i className="ti ti-loader-2" style={{ fontSize: 28, display: "block", marginBottom: 8 }} aria-hidden />
          Artikelstammdaten werden geladen…
        </div>
      )}

      {/* Tabs */}
      {loadState === "done" && (
        <>
          <div style={{ display: "flex", borderBottom: "0.5px solid var(--border)", margin: "10px 0 0" }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setView(t.id)}
                style={{ flex: 1, padding: "10px 2px", border: "none", background: "none", cursor: "pointer",
                  fontSize: 11, color: view === t.id ? "var(--info)" : "var(--text2)",
                  borderBottom: view === t.id ? "2px solid var(--info)" : "2px solid transparent",
                  display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                <i className={`ti ${t.icon}`} style={{ fontSize: 20 }} aria-hidden />
                {t.label}
              </button>
            ))}
          </div>

          {notification && (
            <div style={{ margin: "8px 16px 0", padding: "8px 12px", borderRadius: "var(--radius)",
              background: notification.type === "warn" ? "var(--warn-bg)" : "var(--success-bg)",
              color: notification.type === "warn" ? "var(--warn)" : "var(--success)", fontSize: 13 }}>
              {notification.msg}
            </div>
          )}

          <div style={{ padding: "12px 16px" }}>

            {/* ─── VORBEREITUNG ─── */}
            {view === "prep" && (
              <div>
                <p style={{ ...s.muted, marginBottom: 12 }}>Sollmengen für die Messe festlegen.</p>
                {articles.map(art => {
                  const qty = planned[art.id] || 0;
                  const canCommit = art.stock >= qty;
                  const toOrder = qty > art.stock ? qty - art.stock : 0;
                  return (
                    <div key={art.id} style={s.card}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                        <div style={{ flex: 1, minWidth: 0, paddingRight: 8 }}>
                          <div style={{ fontWeight: 500, fontSize: 13, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{art.name}</div>
                          <div style={s.muted}>{art.sku} · {art.category}</div>
                          <div style={s.muted}>{art.ean ? `EAN: ${art.ean} · ` : ""}VK: {fmtEur(art.price)} · Min: {fmtEur(art.minPrice)}</div>
                        </div>
                        <div style={{ textAlign: "right", fontSize: 12, flexShrink: 0 }}>
                          <div style={{ color: "var(--text2)" }}>Lager</div>
                          <div style={{ fontWeight: 500 }}>{art.stock}</div>
                        </div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={s.muted}>Menge:</span>
                        <input type="number" min={0} value={qty || ""} placeholder="0"
                          onChange={e => setPlan(art.id, e.target.value)} style={{ width: 64, textAlign: "center" }} />
                        {qty > 0 && <span style={s.badge(canCommit)}>{canCommit ? "✓ verfügbar" : `${toOrder} bestellen`}</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* ─── KOMMISSION ─── */}
            {view === "warehouse" && (
              <div>
                <p style={{ ...s.muted, marginBottom: 12 }}>Artikel aus dem Lager entnehmen & bestätigen.</p>
                {articles.filter(a => (planned[a.id] || 0) > 0).length === 0 ? (
                  <div style={{ textAlign: "center", padding: "24px 0", ...s.muted }}>Noch keine Artikel in der Vorbereitung geplant.</div>
                ) : articles.filter(a => (planned[a.id] || 0) > 0).map(art => {
                  const qty = planned[art.id], done = commitDone[art.id];
                  return (
                    <div key={art.id} style={{ ...s.card, border: `0.5px solid ${done ? "var(--success)" : "var(--border)"}`, opacity: done ? 0.7 : 1 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div>
                          <div style={{ fontWeight: 500, fontSize: 13 }}>{art.name}</div>
                          <div style={s.muted}>{art.sku} · <strong style={{ color: "var(--text)" }}>{qty}× entnehmen</strong></div>
                        </div>
                        {done
                          ? <span style={{ fontSize: 13, color: "var(--success)", display: "flex", alignItems: "center", gap: 4 }}><i className="ti ti-check" /> Erledigt</span>
                          : <button onClick={() => commitItem(art)} style={s.btn}>Bestätigen</button>
                        }
                      </div>
                    </div>
                  );
                })}

                {Object.keys(committed).length > 0 && (
                  <div style={{ marginTop: 20 }}>
                    <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 8 }}>Messelager-Bestand</div>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(2, minmax(0, 1fr))", gap: 8 }}>
                      {articles.filter(a => committed[a.id]).map(art => (
                        <div key={art.id} style={{ background: "var(--bg2)", borderRadius: "var(--radius)", padding: "8px 10px" }}>
                          <div style={{ ...s.muted, fontSize: 10, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 2 }}>{art.name}</div>
                          <div style={{ fontWeight: 500, fontSize: 20 }}>{committed[art.id]}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ─── VERKAUF ─── */}
            {view === "sales" && (
              <div>
                {Object.keys(committed).length > 0 && (
                  <div style={{ marginBottom: 14 }}>
                    <div style={{ ...s.muted, marginBottom: 6 }}>Messelager</div>
                    <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4 }}>
                      {articles.filter(a => committed[a.id]).map(art => (
                        <div key={art.id} style={{ flexShrink: 0, background: "var(--bg2)", borderRadius: "var(--radius)", padding: "4px 10px", textAlign: "center", minWidth: 58 }}>
                          <div style={{ ...s.muted, fontSize: 10 }}>{art.sku}</div>
                          <div style={{ fontWeight: 500 }}>{messeStock[art.id] ?? committed[art.id]}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <div style={{ fontWeight: 500, fontSize: 13 }}>Verkaufslisten</div>
                  <button onClick={() => setShowNewList(true)} style={{ ...s.btn, display: "flex", alignItems: "center", gap: 4, fontSize: 12 }}>
                    <i className="ti ti-plus" aria-hidden /> Neue Liste
                  </button>
                </div>

                {showNewList && (
                  <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
                    <input type="text" value={newListName} onChange={e => setNewListName(e.target.value)} placeholder="Kundenname / Listennummer" />
                    <button onClick={createList} style={{ ...s.btn, whiteSpace: "nowrap" }}>OK</button>
                  </div>
                )}

                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
                  {salesLists.map(l => (
                    <button key={l.id} onClick={() => setActiveSalesList(l.id)} style={s.pill(activeSalesList === l.id)}>{l.name}</button>
                  ))}
                </div>

                {!activeList && salesLists.length === 0 && !showNewList && (
                  <div style={{ textAlign: "center", padding: "24px 0", ...s.muted }}>Noch keine Verkaufslisten. Erstelle eine neue Liste.</div>
                )}

                {activeList && (
                  <div>
                    <div style={{ ...s.muted, marginBottom: 6 }}>Artikel hinzufügen:</div>
                    <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 8, marginBottom: 14 }}>
                      {articles.map(art => (
                        <button key={art.id} onClick={() => addToList(art)}
                          style={{ flexShrink: 0, fontSize: 11, padding: "4px 8px", borderRadius: "var(--radius)",
                            border: "0.5px solid var(--border)", background: "var(--bg)", cursor: "pointer", color: "var(--text)", whiteSpace: "nowrap" }}>
                          + {art.sku}
                        </button>
                      ))}
                    </div>

                    {activeList.items.length === 0 && (
                      <div style={{ textAlign: "center", padding: "16px 0", ...s.muted }}>Noch keine Artikel in dieser Liste.</div>
                    )}

                    {activeList.items.map(item => {
                      const art = articles.find(a => a.id === item.id);
                      return (
                        <div key={item.id} style={s.card}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                            <div style={{ flex: 1, minWidth: 0, paddingRight: 8 }}>
                              <div style={{ fontWeight: 500, fontSize: 13, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{art.name}</div>
                              <div style={s.muted}>Min: {fmtEur(art.minPrice)}{role === "supervisor" ? " · Supervisor" : ""}</div>
                            </div>
                            <button onClick={() => removeFromList(item.id)}
                              style={{ border: "none", background: "none", cursor: "pointer", color: "var(--text2)", fontSize: 18 }}>
                              <i className="ti ti-trash" aria-hidden />
                            </button>
                          </div>
                          <div style={{ display: "grid", gridTemplateColumns: "repeat(2, minmax(0, 1fr))", gap: 8 }}>
                            <div>
                              <label style={{ ...s.muted, display: "block", marginBottom: 2 }}>Menge</label>
                              <input type="number" min={1} value={item.qty} onChange={e => updateListItem(item.id, "qty", e.target.value)} />
                            </div>
                            <div>
                              <label style={{ ...s.muted, display: "block", marginBottom: 2 }}>Preis (€)</label>
                              <input type="number" step="0.01" value={item.price.toFixed(2)} onChange={e => updateListItem(item.id, "price", e.target.value)} />
                            </div>
                          </div>
                          <div style={{ marginTop: 8, textAlign: "right", fontWeight: 500, fontSize: 14 }}>{fmtEur(item.qty * item.price)}</div>
                        </div>
                      );
                    })}

                    {activeList.items.length > 0 && (
                      <div style={{ borderTop: "0.5px solid var(--border)", paddingTop: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <span style={{ fontWeight: 500 }}>Gesamt</span>
                        <span style={{ fontWeight: 500, fontSize: 20 }}>{fmtEur(listTotal)}</span>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
