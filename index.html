<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messe-Tool</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#fff; --bg2:#f5f5f3; --bg3:#eeecea;
      --text:#1a1a18; --text2:#6b6b67;
      --border:rgba(0,0,0,0.13); --border2:rgba(0,0,0,0.22);
      --info-bg:#e6f1fb; --info:#185fa5;
      --ok-bg:#eaf3de; --ok:#3b6d11;
      --warn-bg:#faeeda; --warn:#854f0b;
      --err-bg:#fcebeb; --err:#a32d2d;
      --r:8px; --rl:12px;
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#1e1e1c; --bg2:#2a2a28; --bg3:#333331;
        --text:#f0ede8; --text2:#a0a09c;
        --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.2);
        --info-bg:#0c447c; --info:#85b7eb;
        --ok-bg:#27500a; --ok:#97c459;
        --warn-bg:#633806; --warn:#ef9f27;
        --err-bg:#791f1f; --err:#f09595;
      }
    }
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;color:var(--text);background:var(--bg3);min-height:100vh;}
    #app{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;}
    input[type=number],input[type=text]{width:100%;padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:14px;}
    input:focus{outline:none;border-color:var(--info);}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer;white-space:nowrap;}
    .btn:active{opacity:.7;}
    .btn-sm{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;border:0.5px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;}
    .btn-sm:active{opacity:.7;}
    .btn-danger{border-color:var(--err);color:var(--err);background:var(--err-bg);}
    .btn-ok{border-color:var(--ok);color:var(--ok);background:var(--ok-bg);}
    .btn-info{border-color:var(--info);color:var(--info);background:var(--info-bg);}
    .card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:12px;margin-bottom:8px;}
    .badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 7px;border-radius:20px;}
    .badge.ok{background:var(--ok-bg);color:var(--ok);}
    .badge.warn{background:var(--warn-bg);color:var(--warn);}
    .badge.info{background:var(--info-bg);color:var(--info);}
    .badge.err{background:var(--err-bg);color:var(--err);}
    .muted{color:var(--text2);font-size:13px;}
    .tabs{display:flex;border-bottom:0.5px solid var(--border);}
    .tab{flex:1;padding:10px 4px;border:none;background:none;cursor:pointer;font-size:11px;color:var(--text2);border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s;}
    .tab.active{color:var(--info);border-bottom-color:var(--info);}
    .tab i{font-size:20px;}
    .notification{margin:8px 16px 0;padding:8px 12px;border-radius:var(--r);font-size:13px;}
    .notif-ok{background:var(--ok-bg);color:var(--ok);}
    .notif-warn{background:var(--warn-bg);color:var(--warn);}
    .notif-err{background:var(--err-bg);color:var(--err);}
    #settings-panel{display:none;padding:12px 16px;border-bottom:0.5px solid var(--border);background:var(--bg2);}
    #view-prep, #view-warehouse, #view-sales{display:none;}
    .search-bar{position:relative;margin-bottom:12px;}
    .search-bar input{padding-left:32px;}
    .search-bar i{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:16px;pointer-events:none;}
    .divider{height:0.5px;background:var(--border);margin:12px 0;}
    .chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
    .qty-control{display:flex;align-items:center;gap:6px;}
    .qty-btn{width:30px;height:30px;border-radius:50%;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0;}
    .qty-inp{width:52px;text-align:center;padding:5px 4px;}
  </style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px 0;">
    <div style="font-weight:600;font-size:17px;display:flex;align-items:center;gap:7px;">
      <i class="ti ti-anchor" style="color:var(--info);font-size:20px;"></i>
      <span id="messe-label-display">Messe-Tool</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <div style="display:flex;gap:4px;">
        <button class="role-btn btn-sm" data-role="standard"><i class="ti ti-user"></i> Verkäufer</button>
        <button class="role-btn btn-sm" data-role="supervisor"><i class="ti ti-shield-check"></i> Supervisor</button>
      </div>
      <button id="btn-reload" class="btn" style="font-size:12px;padding:3px 8px;display:none;align-items:center;gap:4px;">
        <i class="ti ti-refresh"></i> <span id="art-count">0</span>
      </button>
      <button id="btn-settings" class="btn" style="font-size:12px;padding:3px 8px;">
        <i class="ti ti-settings"></i>
      </button>
    </div>
  </div>

  <div id="settings-panel">
    <div style="font-size:13px;font-weight:500;margin-bottom:10px;">Einstellungen</div>
    <label class="muted" style="display:block;margin-bottom:2px;">Messe-Bezeichnung</label>
    <input type="text" id="inp-messe-label" placeholder="z.B. Boot Düsseldorf 2026" style="margin-bottom:8px;" />
    <label class="muted" style="display:block;margin-bottom:2px;">Google Sheets ID (Artikelstammdaten)</label>
    <input type="text" id="inp-sheet-id" placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms" style="margin-bottom:8px;" />
    <label class="muted" style="display:block;margin-bottom:2px;">Webhook-URL (Google Apps Script)</label>
    <input type="text" id="inp-webhook" placeholder="https://script.google.com/macros/s/..." style="margin-bottom:8px;" />
    <div style="display:flex;gap:8px;">
      <button id="btn-save-settings" class="btn btn-info" style="flex:1;">Speichern</button>
      <button id="btn-test-webhook" class="btn" style="flex:1;">Webhook testen</button>
    </div>
    <div id="webhook-status" style="margin-top:6px;font-size:12px;"></div>
  </div>

  <div class="tabs" style="margin-top:10px;">
    <button class="tab active" data-tab="prep"><i class="ti ti-clipboard-list"></i>Vorbereitung</button>
    <button class="tab" data-tab="warehouse"><i class="ti ti-packages"></i>Kommission</button>
    <button class="tab" data-tab="sales"><i class="ti ti-shopping-cart"></i>Verkauf</button>
  </div>

  <div id="notification-area"></div>

  <div style="padding:12px 16px;">
    <div id="view-prep"></div>
    <div id="view-warehouse"></div>
    <div id="view-sales"></div>
  </div>
</div>

<script>
// ── KONFIGURATION ──────────────────────────────────────────────────────────
// Spaltenreihenfolge im Google Sheet (0-basiert, Zeile 1 = Header):
// SKU · EAN · NAME · KATEGORIE · EKNETTO · UVPBRUTTO · VKBRUTTO · MINDESTVK · LIEFERANT · QUANTITY · IMAGE · ATLOSID
const COL = { SKU:0, EAN:1, NAME:2, KATEGORIE:3, EKNETTO:4, UVPBRUTTO:5, VKBRUTTO:6, MINDESTVK:7, LIEFERANT:8, QUANTITY:9, IMAGE:10, ATLOSID:11 };

const qs = s => document.querySelector(s);

// ── STATE ──────────────────────────────────────────────────────────────────
let articles   = [];          // aus Google Sheets
let messeLabel = "Messe-Tool";
let SHEET_ID   = "";
let WEBHOOK_URL= "";
let role       = "standard";
let currentView= "prep";

// ⚡ WICHTIG: Alle Schlüssel sind SKUs (strings), nicht array-indices
// So bleiben Daten korrekt auch wenn sich die Artikelreihenfolge durch
// IMPORTRANGE-Änderungen in Google Sheets ändert.
let planned    = {};   // { [sku]: qty }         – geplante Mengen
let committed  = {};   // { [sku]: qty }         – kommissionierte Gesamtmenge
let commitLog  = {};   // { [sku]: [{qty, ref, ts}] } – Buchungshistorie
let commitDone = {};   // { [sku]: bool }        – vollständig kommissioniert
let salesLists = [];   // [{id, name, items:[{sku,...}], sold:{[sku]:qty}}]
let activeSales= null;

// ── PERSISTENZ ────────────────────────────────────────────────────────────
function saveState() {
  const s = { planned, committed, commitLog, commitDone, salesLists, activeSales, messeLabel, SHEET_ID, WEBHOOK_URL, role };
  try { localStorage.setItem("messetool_v2", JSON.stringify(s)); } catch(e){}
}
function loadState() {
  try {
    const raw = localStorage.getItem("messetool_v2");
    if (!raw) return;
    const s = JSON.parse(raw);
    planned     = s.planned     || {};
    committed   = s.committed   || {};
    commitLog   = s.commitLog   || {};
    commitDone  = s.commitDone  || {};
    salesLists  = s.salesLists  || [];
    activeSales = s.activeSales || null;
    messeLabel  = s.messeLabel  || "Messe-Tool";
    SHEET_ID    = s.SHEET_ID    || "";
    WEBHOOK_URL = s.WEBHOOK_URL || "";
    role        = s.role        || "standard";
  } catch(e){}
}

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────
let notifTimer;
function showNotification(msg, type="ok") {
  const area = qs("#notification-area");
  clearTimeout(notifTimer);
  area.innerHTML = `<div class="notification notif-${type}">${msg}</div>`;
  notifTimer = setTimeout(() => area.innerHTML="", 2800);
}

// ── GOOGLE SHEETS LADEN ───────────────────────────────────────────────────
async function loadSheet() {
  if (!SHEET_ID) {
    showNotification("Bitte zuerst die Google Sheets ID in den Einstellungen hinterlegen.", "warn");
    return;
  }
  showNotification("Lade Artikelstammdaten…", "ok");
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Artikelstammdaten`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const csv  = await resp.text();
    const rows = parseCSV(csv);
    if (rows.length < 2) throw new Error("Keine Daten");
    const dataRows = rows.slice(1); // Header überspringen
    articles = dataRows
      .filter(r => r[COL.SKU] && r[COL.SKU].trim())
      .map(r => ({
        sku:       r[COL.SKU].trim(),          // ← STABILER SCHLÜSSEL
        ean:       r[COL.EAN]?.trim() || "",
        name:      r[COL.NAME]?.trim() || "",
        category:  r[COL.KATEGORIE]?.trim() || "",
        costPrice: parseFloat(r[COL.EKNETTO])   || 0,
        uvp:       parseFloat(r[COL.UVPBRUTTO]) || 0,
        price:     parseFloat(r[COL.VKBRUTTO])  || 0,
        minPrice:  parseFloat(r[COL.MINDESTVK]) || 0,
        supplier:  r[COL.LIEFERANT]?.trim() || "",
        stock:     parseInt(r[COL.QUANTITY])    || 0,
        image:     r[COL.IMAGE]?.trim() || "",
        atlosId:   r[COL.ATLOSID]?.trim() || "",
      }));
    qs("#art-count").textContent = articles.length;
    qs("#btn-reload").style.display = "flex";
    showNotification(`${articles.length} Artikel geladen`);
    renderView();
  } catch(e) {
    showNotification("Fehler beim Laden: " + e.message, "err");
  }
}

function parseCSV(text) {
  const rows = [];
  let row = [], cell = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (c === '"') inQ = false;
      else cell += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(cell); cell = ""; }
      else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ""; }
      else if (c !== '\r') cell += c;
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

// ── VIEWS ─────────────────────────────────────────────────────────────────
function renderView() {
  ["prep","warehouse","sales"].forEach(v => qs(`#view-${v}`).style.display = "none");
  qs(`#view-${currentView}`).style.display = "block";
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === currentView));
  if (currentView === "prep")      renderPrep();
  if (currentView === "warehouse") renderWarehouse();
  if (currentView === "sales")     renderSales();
}

// ── VORBEREITUNG ──────────────────────────────────────────────────────────
function renderPrep() {
  const wrap = qs("#view-prep");
  if (articles.length === 0) {
    wrap.innerHTML = `<div style="text-align:center;padding:32px 0;" class="muted">
      <i class="ti ti-table-import" style="font-size:40px;display:block;margin-bottom:12px;"></i>
      Noch keine Artikel geladen.<br>
      <button class="btn btn-info" style="margin-top:12px;" onclick="loadSheet()">
        <i class="ti ti-refresh"></i> Aus Google Sheets laden
      </button>
    </div>`;
    return;
  }

  let searchVal = "";
  wrap.innerHTML = `
    <p class="muted" style="margin-bottom:12px;">Sollmengen für die Messe festlegen. Änderungen werden per SKU gespeichert – stabil auch wenn sich die Reihenfolge im Sheet ändert.</p>
    <div class="search-bar">
      <i class="ti ti-search"></i>
      <input type="text" id="prep-search" placeholder="Suche nach Name, SKU oder EAN…" />
    </div>
    <div id="prep-list"></div>`;

  function renderList(filter) {
    const list = qs("#prep-list");
    const filt = filter.toLowerCase();
    const shown = articles.filter(a =>
      !filt ||
      a.name.toLowerCase().includes(filt) ||
      a.sku.toLowerCase().includes(filt) ||
      a.ean.toLowerCase().includes(filt)
    );
    list.innerHTML = "";
    shown.forEach(art => {
      const sku    = art.sku;
      const qty    = planned[sku] || 0;
      const comm   = committed[sku] || 0;
      const done   = commitDone[sku] || false;
      const offen  = Math.max(0, qty - comm);
      const toOrder= Math.max(0, qty - art.stock);

      const card = document.createElement("div");
      card.className = "card";
      if (qty > 0) card.style.borderColor = done ? "var(--ok)" : "var(--info)";

      let statusChips = "";
      if (qty > 0) {
        statusChips += `<span class="badge info"><i class="ti ti-flag" style="font-size:10px;"></i> Ausgewählt: ${qty}</span>`;
        if (done) {
          statusChips += `<span class="badge ok"><i class="ti ti-check" style="font-size:10px;"></i> Vollst. komm.</span>`;
        } else if (comm > 0) {
          statusChips += `<span class="badge warn"><i class="ti ti-clock" style="font-size:10px;"></i> Komm.: ${comm}</span>`;
          statusChips += `<span class="badge err"><i class="ti ti-alert-triangle" style="font-size:10px;"></i> Offen: ${offen}</span>`;
        }
        if (toOrder > 0) {
          statusChips += `<span class="badge err"><i class="ti ti-truck" style="font-size:10px;"></i> Bestellen: ${toOrder}</span>`;
        }
      }

      card.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
          <div style="flex:1;min-width:0;">
            <div style="font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${art.name}</div>
            <div class="muted">${art.sku}${art.ean ? " · " + art.ean : ""} · ${art.category}</div>
            <div class="muted">VK: ${fmtEur(art.price)} · Min: ${fmtEur(art.minPrice)} · Lager: ${art.stock}</div>
            ${statusChips ? `<div class="chip-row">${statusChips}</div>` : ""}
          </div>
          <div class="qty-control" style="flex-shrink:0;">
            <button class="qty-btn" data-sku="${sku}" data-dir="-1">−</button>
            <input class="qty-inp" type="number" min="0" value="${qty}" data-sku="${sku}" />
            <button class="qty-btn" data-sku="${sku}" data-dir="1">+</button>
          </div>
        </div>`;

      list.appendChild(card);
    });

    // Events
    list.querySelectorAll(".qty-btn").forEach(b => {
      b.addEventListener("click", () => {
        const sku = b.dataset.sku;
        const dir = parseInt(b.dataset.dir);
        const curr = planned[sku] || 0;
        const neu  = Math.max(0, curr + dir);
        if (neu === 0) delete planned[sku]; else planned[sku] = neu;
        saveState();
        renderList(qs("#prep-search")?.value || "");
        sendWebhook("PLAN_UPDATE", { sku, qty: neu, art: articles.find(a => a.sku === sku) });
      });
    });
    list.querySelectorAll(".qty-inp").forEach(inp => {
      inp.addEventListener("change", () => {
        const sku = inp.dataset.sku;
        const neu = Math.max(0, parseInt(inp.value) || 0);
        if (neu === 0) delete planned[sku]; else planned[sku] = neu;
        saveState();
        renderList(qs("#prep-search")?.value || "");
        sendWebhook("PLAN_UPDATE", { sku, qty: neu, art: articles.find(a => a.sku === sku) });
      });
    });
  }

  renderList("");
  qs("#prep-search").addEventListener("input", e => renderList(e.target.value));
}

// ── KOMMISSIONIERUNG ──────────────────────────────────────────────────────
function renderWarehouse() {
  const wrap = qs("#view-warehouse");
  wrap.innerHTML = `<p class="muted" style="margin-bottom:12px;">Artikel entnehmen & bestätigen. Artikel können auch wieder aus der Liste entfernt werden.</p>`;

  // Nur Artikel mit geplanter Menge > 0 und noch nicht vollständig kommissioniert
  const toCommit = articles.filter(a => (planned[a.sku] || 0) > 0 && !commitDone[a.sku]);

  if (toCommit.length === 0) {
    wrap.innerHTML += `<div style="text-align:center;padding:32px 0;" class="muted">
      <i class="ti ti-clipboard-list" style="font-size:40px;display:block;margin-bottom:12px;"></i>
      Noch keine Artikel in der Vorbereitung ausgewählt.
    </div>`;
    return;
  }

  // Zusammenfassung
  const totalPlanned  = toCommit.reduce((s, a) => s + (planned[a.sku] || 0), 0);
  const totalCommitted= toCommit.reduce((s, a) => s + (committed[a.sku] || 0), 0);
  const totalOpen     = Math.max(0, totalPlanned - totalCommitted);
  wrap.innerHTML += `
    <div class="card" style="background:var(--bg2);margin-bottom:16px;">
      <div style="display:flex;gap:16px;justify-content:space-around;text-align:center;">
        <div><div style="font-size:20px;font-weight:600;">${totalPlanned}</div><div class="muted">Geplant</div></div>
        <div><div style="font-size:20px;font-weight:600;color:var(--ok);">${totalCommitted}</div><div class="muted">Kommissioniert</div></div>
        <div><div style="font-size:20px;font-weight:600;color:${totalOpen>0?"var(--warn)":"var(--ok)"};">${totalOpen}</div><div class="muted">Offen</div></div>
      </div>
    </div>`;

  toCommit.forEach(art => {
    const sku   = art.sku;
    const qty   = planned[sku] || 0;
    const comm  = committed[sku] || 0;
    const done  = commitDone[sku] || false;
    const offen = Math.max(0, qty - comm);
    const log   = commitLog[sku] || [];
    const maxEntnahme = Math.min(offen, art.stock);

    const card = document.createElement("div");
    card.className = "card";
    card.style.borderColor = done ? "var(--ok)" : (offen === 0 ? "var(--border)" : "var(--border)");

    // Buchungshistorie
    const logHTML = log.length ? `
      <div style="margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border);">
        <div class="muted" style="font-size:11px;margin-bottom:4px;">Buchungshistorie:</div>
        ${log.map(e => `<div style="font-size:12px;color:var(--text2);">
          <i class="ti ti-box" style="font-size:10px;"></i>
          ${e.qty}× – ${e.ref ? `<em>${e.ref}</em>` : "kein Kommentar"} – ${new Date(e.ts).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}
        </div>`).join("")}
      </div>` : "";

    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;">
        <div style="flex:1;min-width:160px;">
          <div style="font-weight:500;font-size:13px;">${art.name}</div>
          <div class="muted">${art.sku}${art.ean ? " · " + art.ean : ""}</div>
          <div class="chip-row">
            <span class="badge info">Geplant: ${qty}</span>
            <span class="badge ok">Komm.: ${comm}</span>
            ${offen > 0 ? `<span class="badge warn">Offen: ${offen}</span>` : `<span class="badge ok"><i class="ti ti-check" style="font-size:10px;"></i> Erledigt</span>`}
            ${art.stock < offen ? `<span class="badge err">Lager: ${art.stock}</span>` : ""}
          </div>
          ${logHTML}
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0;">
          ${!done ? `
            <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
              <input class="qty-inp inp-wh-qty" type="number" min="1" max="${Math.max(1,art.stock)}"
                value="${maxEntnahme > 0 ? maxEntnahme : 1}" data-sku="${sku}"
                style="width:60px;" />
              <input class="btn" type="text" placeholder="Box / Kommentar"
                id="ref-${sku}" style="width:120px;font-size:12px;padding:6px 8px;"
                value="${localStorage.getItem('lastRef') || ''}" />
            </div>
            <button class="btn btn-ok btn-commit" data-sku="${sku}" style="width:100%;">
              <i class="ti ti-check"></i> Bestätigen
            </button>` : `
            <button class="btn-sm btn-undo" data-sku="${sku}">
              <i class="ti ti-arrow-back-up"></i> Korrigieren
            </button>`
          }
          <button class="btn-sm btn-danger btn-remove-from-prep" data-sku="${sku}" title="Artikel aus Kommissionsliste entfernen">
            <i class="ti ti-trash"></i> Entfernen
          </button>
        </div>
      </div>`;

    wrap.appendChild(card);
  });

  // Events: Bestätigen
  wrap.querySelectorAll(".btn-commit").forEach(b => b.addEventListener("click", async () => {
    const sku  = b.dataset.sku;
    const art  = articles.find(a => a.sku === sku);
    const inp  = b.closest(".card").querySelector(".inp-wh-qty");
    const refInp = qs(`#ref-${sku}`);
    const entnahme = Math.max(1, parseInt(inp?.value) || 1);
    const ref  = refInp?.value.trim() || "";
    if (ref) localStorage.setItem("lastRef", ref);

    committed[sku] = (committed[sku] || 0) + entnahme;
    if (!commitLog[sku]) commitLog[sku] = [];
    commitLog[sku].push({ qty: entnahme, ref, ts: Date.now() });
    if (committed[sku] >= (planned[sku] || 0)) commitDone[sku] = true;

    saveState();
    showNotification(`${entnahme}× ${art.name} kommissioniert${ref ? " → " + ref : ""}`);
    await sendWebhook("COMMIT", { sku, art, qty: entnahme, ref, totalCommitted: committed[sku], planned: planned[sku] });
    renderWarehouse();
  }));

  // Events: Korrigieren (Kommissionierung rückgängig)
  wrap.querySelectorAll(".btn-undo").forEach(b => b.addEventListener("click", async () => {
    const sku = b.dataset.sku;
    const art = articles.find(a => a.sku === sku);
    const lastEntry = (commitLog[sku] || []).at(-1);
    const info = lastEntry ? `${lastEntry.qty}× (${lastEntry.ref || "kein Kommentar"})` : `${committed[sku] || 0}×`;
    if (!confirm(`Letzte Buchung von "${art.name}" rückgängig machen?\n${info}`)) return;

    const undoQty = lastEntry ? lastEntry.qty : (committed[sku] || 0);
    commitLog[sku] = (commitLog[sku] || []).slice(0, -1);
    committed[sku] = Math.max(0, (committed[sku] || 0) - undoQty);
    if (committed[sku] === 0) delete committed[sku];
    delete commitDone[sku];

    saveState();
    showNotification(`${art.name} – letzte Buchung rückgängig gemacht`, "warn");
    await sendWebhook("COMMIT_UNDO", { sku, art, undoQty });
    renderWarehouse();
  }));

  // Events: Aus Kommission entfernen
  wrap.querySelectorAll(".btn-remove-from-prep").forEach(b => b.addEventListener("click", async () => {
    const sku = b.dataset.sku;
    const art = articles.find(a => a.sku === sku);
    const hasCommitted = (committed[sku] || 0) > 0;
    const confirmMsg = hasCommitted
      ? `"${art.name}" aus der Kommissionsliste entfernen?\n\nHINWEIS: Es wurden bereits ${committed[sku]} Stück kommissioniert. Diese Buchungen bleiben im Log erhalten.`
      : `"${art.name}" aus der Kommissionsliste entfernen?`;
    if (!confirm(confirmMsg)) return;

    delete planned[sku];
    delete commitDone[sku];
    // committed und commitLog bleiben für das Webhook-Log erhalten
    // aber aus der Anzeige verschwindet der Artikel

    saveState();
    showNotification(`${art.name} aus Kommissionsliste entfernt`, "warn");
    await sendWebhook("REMOVE_FROM_PREP", { sku, art, wasCommitted: committed[sku] || 0 });
    renderWarehouse();
  }));
}

// ── VERKAUF ───────────────────────────────────────────────────────────────
function renderSales() {
  const wrap = qs("#view-sales");
  wrap.innerHTML = `<p class="muted" style="margin-bottom:12px;">Verkaufslisten für Messe-Kunden.</p>`;

  // Neue Liste anlegen
  const newBtn = document.createElement("button");
  newBtn.className = "btn btn-info";
  newBtn.style.marginBottom = "12px";
  newBtn.innerHTML = `<i class="ti ti-plus"></i> Neue Kundenliste`;
  newBtn.onclick = () => {
    const name = prompt("Kundenname / Listenbezeichnung:");
    if (!name) return;
    const list = { id: Date.now().toString(), name, items: [], sold: {} };
    salesLists.push(list);
    activeSales = list.id;
    saveState();
    renderSales();
  };
  wrap.appendChild(newBtn);

  if (salesLists.length === 0) {
    wrap.innerHTML += `<div class="muted" style="text-align:center;padding:24px 0;">Noch keine Verkaufslisten angelegt.</div>`;
    return;
  }

  // Listenauswahl
  const tabRow = document.createElement("div");
  tabRow.style.cssText = "display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;";
  salesLists.forEach(l => {
    const b = document.createElement("button");
    b.className = "btn" + (l.id === activeSales ? " btn-info" : "");
    b.textContent = l.name;
    b.style.fontSize = "12px";
    b.onclick = () => { activeSales = l.id; saveState(); renderSales(); };
    tabRow.appendChild(b);
  });
  wrap.appendChild(tabRow);

  const list = salesLists.find(l => l.id === activeSales);
  if (!list) return;

  // Artikel hinzufügen (nur aus Messelager)
  const messeArtikel = articles.filter(a => (committed[a.sku] || 0) > 0);
  if (messeArtikel.length > 0) {
    const addRow = document.createElement("div");
    addRow.style.marginBottom = "10px";
    const sel = document.createElement("select");
    sel.style.cssText = "width:100%;padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:14px;margin-bottom:6px;";
    sel.innerHTML = `<option value="">— Artikel auswählen —</option>` +
      messeArtikel.map(a => {
        const verfuegbar = (committed[a.sku] || 0) - (list.sold?.[a.sku] || 0) - salesLists.filter(l => l.id !== list.id).reduce((s, l2) => s + (l2.sold?.[a.sku] || 0), 0);
        return `<option value="${a.sku}">${a.name} (${a.sku}) – verf.: ${Math.max(0, verfuegbar)}</option>`;
      }).join("");

    const addBtn = document.createElement("button");
    addBtn.className = "btn btn-info";
    addBtn.innerHTML = `<i class="ti ti-plus"></i> Hinzufügen`;
    addBtn.onclick = () => {
      const sku = sel.value;
      if (!sku) return;
      const art = articles.find(a => a.sku === sku);
      if (!art) return;
      if (list.items.find(i => i.sku === sku)) {
        showNotification("Bereits in dieser Liste vorhanden", "warn"); return;
      }
      list.items.push({ sku, name: art.name, price: art.price, minPrice: art.minPrice, qty: 1 });
      saveState(); renderSales();
    };
    addRow.appendChild(sel);
    addRow.appendChild(addBtn);
    wrap.appendChild(addRow);
  }

  if (list.items.length === 0) {
    wrap.innerHTML += `<div class="muted" style="padding:16px 0;">Noch keine Artikel in dieser Liste.</div>`;
  } else {
    list.items.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";
      const art = articles.find(a => a.sku === item.sku);
      card.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
          <div style="flex:1;min-width:0;">
            <div style="font-weight:500;font-size:13px;">${item.name}</div>
            <div class="muted">${item.sku} · VK: ${fmtEur(item.price)}${art ? ` · Min: ${fmtEur(art.minPrice)}` : ""}</div>
          </div>
          <div class="qty-control" style="flex-shrink:0;">
            <button class="qty-btn" data-sku="${item.sku}" data-dir="-1">−</button>
            <input class="qty-inp" type="number" min="1" value="${item.qty}" data-sku="${item.sku}" style="width:52px;" />
            <button class="qty-btn" data-sku="${item.sku}" data-dir="1">+</button>
            <button class="btn-sm btn-danger" data-sku="${item.sku}" data-action="remove">
              <i class="ti ti-trash"></i>
            </button>
          </div>
        </div>`;
      wrap.appendChild(card);
    });

    wrap.querySelectorAll(".qty-btn").forEach(b => b.addEventListener("click", () => {
      const sku = b.dataset.sku; const dir = parseInt(b.dataset.dir);
      const item = list.items.find(i => i.sku === sku);
      if (item) { item.qty = Math.max(1, (item.qty || 1) + dir); saveState(); renderSales(); }
    }));
    wrap.querySelectorAll(".qty-inp").forEach(inp => inp.addEventListener("change", () => {
      const item = list.items.find(i => i.sku === inp.dataset.sku);
      if (item) { item.qty = Math.max(1, parseInt(inp.value) || 1); saveState(); }
    }));
    wrap.querySelectorAll("[data-action=remove]").forEach(b => b.addEventListener("click", () => {
      list.items = list.items.filter(i => i.sku !== b.dataset.sku);
      saveState(); renderSales();
    }));

    const total = list.items.reduce((s, i) => s + i.qty * i.price, 0);
    const totDiv = document.createElement("div");
    totDiv.style.cssText = "border-top:0.5px solid var(--border);padding-top:12px;display:flex;justify-content:space-between;align-items:center;margin-top:4px;";
    totDiv.innerHTML = `<span style="font-weight:500;">Gesamt</span><span style="font-weight:600;font-size:20px;">${fmtEur(total)}</span>`;
    wrap.appendChild(totDiv);

    const sellBtn = document.createElement("button");
    sellBtn.className = "btn btn-ok";
    sellBtn.style.cssText = "margin-top:10px;width:100%;justify-content:center;";
    sellBtn.innerHTML = `<i class="ti ti-shopping-cart-check"></i> Verkauf abschließen`;
    sellBtn.onclick = async () => {
      if (!confirm("Verkauf abschließen?")) return;
      list.items.forEach(i => {
        if (!list.sold) list.sold = {};
        list.sold[i.sku] = (list.sold[i.sku] || 0) + i.qty;
        committed[i.sku] = Math.max(0, (committed[i.sku] || 0) - i.qty);
      });
      await sendWebhook("SALE", { list: list.name, items: list.items, total });
      list.items = [];
      saveState(); renderSales();
      showNotification(`Verkauf "${list.name}" abgeschlossen`);
    };
    wrap.appendChild(sellBtn);
  }

  // Liste löschen
  const delBtn = document.createElement("button");
  delBtn.className = "btn btn-danger";
  delBtn.style.cssText = "margin-top:10px;font-size:12px;";
  delBtn.innerHTML = `<i class="ti ti-trash"></i> Liste "${list.name}" löschen`;
  delBtn.onclick = () => {
    if (!confirm(`Liste "${list.name}" löschen?`)) return;
    salesLists = salesLists.filter(l => l.id !== list.id);
    activeSales = salesLists[0]?.id || null;
    saveState(); renderSales();
  };
  wrap.appendChild(delBtn);
}

// ── WEBHOOK → GOOGLE SHEETS ───────────────────────────────────────────────
// Alle Änderungen werden mit der SKU als stabilem Schlüssel gesendet.
// Das Apps Script schreibt sie in das Blatt "Messeänderungen".
async function sendWebhook(action, data) {
  if (!WEBHOOK_URL) return;
  try {
    await fetch(WEBHOOK_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action,
        messe:     messeLabel,
        timestamp: new Date().toISOString(),
        ...data,
        // Immer SKU mitschicken, nie array-index
        sku:       data.sku || data.art?.sku || "",
        artName:   data.art?.name || "",
        ean:       data.art?.ean  || "",
      })
    });
  } catch(e) { console.warn("Webhook:", e); }
}

// ── HILFSFUNKTIONEN ───────────────────────────────────────────────────────
function fmtEur(v) {
  return (v || 0).toLocaleString("de-DE", { style: "currency", currency: "EUR" });
}

// ── EVENTS ────────────────────────────────────────────────────────────────
document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => {
  currentView = t.dataset.tab;
  renderView();
}));

document.querySelectorAll(".role-btn").forEach(b => b.addEventListener("click", () => {
  role = b.dataset.role;
  document.querySelectorAll(".role-btn").forEach(x => x.classList.toggle("btn-info", x.dataset.role === role));
  saveState();
}));

qs("#btn-reload").addEventListener("click", () => {
  if (!confirm("Artikelstammdaten neu laden? Planung, Kommission und Verkaufslisten bleiben erhalten.")) return;
  loadSheet();
});

qs("#btn-settings").addEventListener("click", () => {
  const panel = qs("#settings-panel");
  const open = panel.style.display === "none";
  panel.style.display = open ? "block" : "none";
  if (open) {
    qs("#inp-messe-label").value = messeLabel;
    qs("#inp-sheet-id").value    = SHEET_ID;
    qs("#inp-webhook").value     = WEBHOOK_URL;
  }
});

qs("#btn-save-settings").addEventListener("click", () => {
  messeLabel  = qs("#inp-messe-label").value.trim() || "Messe-Tool";
  SHEET_ID    = qs("#inp-sheet-id").value.trim();
  WEBHOOK_URL = qs("#inp-webhook").value.trim();
  qs("#messe-label-display").textContent = messeLabel;
  saveState();
  qs("#settings-panel").style.display = "none";
  showNotification("Einstellungen gespeichert");
  if (articles.length === 0 && SHEET_ID) loadSheet();
});

qs("#btn-test-webhook").addEventListener("click", async () => {
  const url    = qs("#inp-webhook").value.trim();
  const status = qs("#webhook-status");
  if (!url) { status.textContent = "Bitte zuerst eine URL eingeben."; status.style.color = "var(--err)"; return; }
  status.textContent = "Teste…"; status.style.color = "var(--text2)";
  try {
    await fetch(url, { method: "GET", mode: "no-cors" });
    status.textContent = "✓ Webhook erreichbar";
    status.style.color = "var(--ok)";
  } catch(e) {
    status.textContent = "✗ " + e.message;
    status.style.color = "var(--err)";
  }
});

// ── START ─────────────────────────────────────────────────────────────────
loadState();
qs("#messe-label-display").textContent = messeLabel;
document.querySelector(`.role-btn[data-role="${role}"]`)?.classList.add("btn-info");
renderView();
if (SHEET_ID) loadSheet();
</script>
</body>
</html>
